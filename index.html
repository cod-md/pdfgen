
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Medical Sheet Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Courier+Prime:wght@400;700&family=Playfair+Display:wght@600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .thumb-scroll::-webkit-scrollbar { height: 6px; }
        .thumb-scroll::-webkit-scrollbar-track { background: transparent; }
        .thumb-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .thumb-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* A4 Page Styling */
        .a4-page {
            aspect-ratio: 1 / 1.4142;
            background-color: white;
            width: 100%;
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.15), 0 0 2px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            border: 1px solid #e2e8f0;
            container-type: inline-size;
            transition: transform 0.3s ease;
        }
        
        .active-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #6366f1;
            background-color: rgba(99, 102, 241, 0.04);
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .preview-scroll::-webkit-scrollbar { width: 8px; }
        .preview-scroll::-webkit-scrollbar-track { background: transparent; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        
        textarea { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        textarea:focus { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(90deg, #2563eb, #6366f1);
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 text-slate-800">

    <div class="max-w-[1400px] mx-auto">
        <!-- Premium Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8 bg-white/80 backdrop-blur-xl p-5 md:px-8 rounded-3xl shadow-sm border border-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-200 shrink-0">
                    <i data-lucide="layers" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">
                        Sheet <span class="gradient-text">Builder</span>
                    </h1>
                    <p class="text-slate-500 text-sm mt-0.5 font-medium">Create unlimited A4 pages with perfect formatting.</p>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <button id="clearBtn" class="px-4 py-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl text-sm font-semibold transition-all">Clear All</button>
                <div class="w-px h-6 bg-slate-200 mx-1 hidden md:block"></div>
                <button onclick="addNewPage()" class="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-700 px-5 py-2.5 rounded-xl font-semibold transition-all active:scale-95 border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-200 group">
                    <i data-lucide="file-plus-2" size="18" class="text-blue-500 group-hover:scale-110 transition-transform"></i>
                    Add Page
                </button>
                <button id="downloadBtn" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-7 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transition-all active:scale-95">
                    <i data-lucide="printer" size="18"></i>
                    Export PDF
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- EDITOR PANEL -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 overflow-hidden sticky top-8 flex flex-col">
                    
                    <div class="bg-gradient-to-r from-slate-900 to-slate-800 px-6 py-5 text-white flex justify-between items-center relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-2xl"></div>
                        <div class="relative z-10 flex flex-col gap-1">
                            <span class="text-[10px] text-slate-400 font-bold tracking-widest uppercase flex items-center gap-1.5">
                                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Active Editor
                            </span>
                            <span class="font-bold text-lg flex items-center gap-2">
                                Page <span id="pageLabel" class="text-indigo-300">1</span>, Slot <span id="slotLabel" class="bg-indigo-500/30 px-2.5 py-0.5 rounded-lg text-white border border-indigo-400/30">1</span>
                            </span>
                        </div>
                        <span class="text-xs text-slate-300 font-medium bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm relative z-10 border border-white/5" id="totalSlotsCount">6 slots</span>
                    </div>

                    <!-- THE FIX: Styling Toolbar with gap-x-10 -->
                    <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100 flex flex-wrap items-center gap-x-10 gap-y-4">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Box Color:</span>
                            <div class="flex gap-2" id="colorSwatches">
                                <!-- Colors injected here -->
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Font:</span>
                            <div class="relative flex items-center">
                                <select id="fontSelect" onchange="changeFont(this.value)" class="appearance-none text-xs font-bold border border-slate-200 rounded-lg pl-3 pr-8 py-1.5 bg-white text-slate-700 cursor-pointer outline-none focus:ring-2 focus:ring-indigo-100 shadow-sm">
                                    <option value="sans">Modern (Sans)</option>
                                    <option value="serif">Classic (Serif)</option>
                                    <option value="mono">Typewriter (Mono)</option>
                                </select>
                                <div class="absolute pointer-events-none right-2 text-slate-400">
                                    <i data-lucide="chevron-down" size="14"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 md:p-8 space-y-7 bg-[#fcfdfd]">
                        
                        <!-- Multi-Image Upload -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-700 uppercase tracking-wider">
                                    <span class="bg-blue-100 text-blue-600 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">1</span> 
                                    Clinical Images
                                </label>
                            </div>
                            <div id="thumbContainer" class="hidden w-full bg-white border border-slate-200 rounded-2xl p-2.5 mb-3 flex gap-2 overflow-x-auto thumb-scroll shadow-sm"></div>
                            <div id="dropZone" class="relative group w-full h-36 rounded-2xl border-2 border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/50 transition-all overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-slate-100/50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <div class="flex flex-col items-center relative z-10">
                                    <div class="bg-white p-3 rounded-full shadow-sm mb-3 group-hover:scale-110 group-hover:shadow-md transition-all border border-slate-100">
                                        <i data-lucide="image-plus" class="text-indigo-500 w-6 h-6"></i>
                                    </div>
                                    <span class="text-sm text-slate-600 font-semibold">Click to add images</span>
                                </div>
                                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
                            </div>
                        </div>

                        <!-- Questions -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-700 uppercase tracking-wider">
                                    <span class="bg-blue-100 text-blue-600 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">2</span> 
                                    Questions Text
                                </label>
                            </div>
                            <textarea id="qInput" class="w-full h-24 p-4 rounded-2xl border border-slate-200 bg-white focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all text-sm font-bold resize-none leading-relaxed text-slate-800 placeholder:text-slate-300 shadow-sm" placeholder="A) What is the diagnosis?&#10;B) Describe the findings."></textarea>
                        </div>

                        <!-- Answers -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-2 text-xs font-bold text-slate-700 uppercase tracking-wider">
                                    <span class="bg-rose-100 text-rose-500 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">3</span> 
                                    Answers (Colored Box)
                                </label>
                            </div>
                            <textarea id="aInput" class="w-full h-24 p-4 rounded-2xl border border-slate-200 outline-none transition-all text-sm font-bold resize-none leading-relaxed shadow-sm text-slate-800" placeholder="A) Iron deficiency anemia&#10;B) Microcytic, hypochromic"></textarea>
                        </div>

                        <button id="nextBtn" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-xl shadow-slate-900/20 group">
                            <span>Save & Edit Next Slot</span>
                            <i data-lucide="arrow-right" size="18" class="group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- PREVIEW PANEL -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-8rem)]">
                <div class="flex justify-between items-end mb-4 shrink-0 px-2">
                    <div>
                        <h3 class="text-sm font-extrabold text-slate-800 uppercase tracking-widest mb-1">Canvas Preview</h3>
                        <p class="text-xs text-slate-500 font-medium">WYSIWYG layout • Scroll to view pages • Click to edit</p>
                    </div>
                </div>
                
                <div id="previewScrollArea" class="bg-[#eef2f6] p-4 sm:p-8 md:p-12 rounded-3xl border border-slate-200/80 overflow-y-auto preview-scroll flex-1 shadow-inner relative">
                    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 16px 16px;"></div>
                    <div id="gridPreview" class="relative flex flex-col gap-12 items-center w-full max-w-3xl mx-auto pb-12 z-10">
                        <!-- A4 Pages injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let activeIdx = 0;
        let dataStore = [];
        const dummyDoc = new jsPDF('p', 'mm', 'a4');

        // Added Themes with Hex codes and RGB (for jsPDF native rendering)
        const themes = {
            pink:   { hex: '#FBE4E4', border: '#F5E6E6', rgb: [251, 228, 228] },
            blue:   { hex: '#E4F0FB', border: '#E6EEF5', rgb: [228, 240, 251] },
            green:  { hex: '#E4FBEA', border: '#E6F5E9', rgb: [228, 251, 234] },
            yellow: { hex: '#FBF4E4', border: '#F5EFE6', rgb: [251, 244, 228] },
            purple: { hex: '#EBE4FB', border: '#EAE6F5', rgb: [235, 228, 251] }
        };

        // Mapped UI Fonts to standard Native jsPDF Fonts
        const fonts = {
            sans:  { css: "'Inter', sans-serif", jspdf: "helvetica" },
            serif: { css: "'Playfair Display', serif", jspdf: "times" },
            mono:  { css: "'Courier Prime', monospace", jspdf: "courier" }
        };

        let activeTheme = 'pink';
        let activeFont = 'sans';

        const ui = {
            file: document.getElementById('fileInput'),
            thumbContainer: document.getElementById('thumbContainer'),
            dropZone: document.getElementById('dropZone'),
            q: document.getElementById('qInput'),
            a: document.getElementById('aInput'),
            grid: document.getElementById('gridPreview'),
            next: document.getElementById('nextBtn'),
            slotLabel: document.getElementById('slotLabel'),
            pageLabel: document.getElementById('pageLabel'),
            totalCount: document.getElementById('totalSlotsCount'),
            scrollArea: document.getElementById('previewScrollArea')
        };

        function initStylingControls() {
            const swatches = document.getElementById('colorSwatches');
            swatches.innerHTML = Object.keys(themes).map(key => `
                <button onclick="changeTheme('${key}')" 
                    class="w-5 h-5 rounded-full transition-all focus:outline-none shadow-sm ${activeTheme === key ? 'ring-2 ring-slate-800 ring-offset-2 scale-110' : 'hover:scale-110'}" 
                    style="background-color: ${themes[key].hex}; border: 1px solid ${themes[key].border};">
                </button>
            `).join('');
        }

        function changeTheme(key) {
            activeTheme = key;
            initStylingControls();
            refresh();
        }

        function changeFont(key) {
            activeFont = key;
            refresh();
        }

        initStylingControls();
        addNewPage(false);

        function addNewPage(shouldRefresh = true) {
            const startId = dataStore.length;
            for(let i = 0; i < 6; i++) {
                dataStore.push({ id: startId + i, images: [], questions: "", answers: "", filled: false });
            }
            if (shouldRefresh) {
                activeIdx = startId; 
                refresh();
                scrollToActive();
            }
        }

        function getPdfLinesHtml(text, maxWidthMM) {
            if (!text) return '';
            dummyDoc.setFont(fonts[activeFont].jspdf, "bold"); // Use selected font
            dummyDoc.setFontSize(10);
            const lines = dummyDoc.splitTextToSize(text, maxWidthMM);
            return lines.map(line => {
                const safeLine = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                return `<div>${safeLine || '&nbsp;'}</div>`;
            }).join('');
        }

        function refresh() {
            const item = dataStore[activeIdx];
            const currentPage = Math.floor(activeIdx / 6) + 1;
            const currentSlotOnPage = (activeIdx % 6) + 1;

            ui.pageLabel.textContent = currentPage;
            ui.slotLabel.textContent = currentSlotOnPage;
            ui.totalCount.textContent = `Total: ${dataStore.length} slots`;
            
            // Apply Font and Color Styling to Editor inputs
            ui.q.style.fontFamily = fonts[activeFont].css;
            ui.a.style.fontFamily = fonts[activeFont].css;
            ui.a.style.backgroundColor = themes[activeTheme].hex;
            
            ui.q.value = item.questions;
            ui.a.value = item.answers;
            
            if (item.images.length > 0) {
                ui.thumbContainer.classList.remove('hidden');
                ui.dropZone.classList.add('h-20');
                ui.dropZone.classList.remove('h-36');
                ui.dropZone.querySelector('span:first-of-type').textContent = "Add more images";
                
                ui.thumbContainer.innerHTML = item.images.map((img, i) => `
                    <div class="relative shrink-0 w-16 h-16 bg-white rounded-xl border border-slate-200 p-1 group shadow-sm">
                        <img src="${img}" class="w-full h-full object-cover rounded-lg" />
                        <button onclick="removeImage(${i})" class="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1 hidden group-hover:block hover:bg-rose-600 transition-colors shadow-md">
                            <i data-lucide="x" size="10"></i>
                        </button>
                    </div>
                `).join('');
            } else {
                ui.thumbContainer.classList.add('hidden');
                ui.dropZone.classList.add('h-36');
                ui.dropZone.classList.remove('h-20');
                ui.dropZone.querySelector('span:first-of-type').textContent = "Click to add images";
            }

            const textMaxWidthMM = (210 / 2) - 22; 
            const totalPages = dataStore.length / 6;
            let fullHtml = '';

            for (let p = 0; p < totalPages; p++) {
                let pageSlotsHtml = '';
                
                for (let i = 0; i < 6; i++) {
                    const globalIdx = (p * 6) + i;
                    const s = dataStore[globalIdx];
                    
                    let borderClass = 'border-slate-800 ';
                    if (i % 2 === 0) borderClass += 'border-r ';
                    if (i < 4) borderClass += 'border-b ';
                    
                    let activeClass = globalIdx === activeIdx ? 'active-cell' : 'hover:bg-slate-50 transition-colors';
                    let activeIdAttr = globalIdx === activeIdx ? 'id="active-slot-element"' : '';

                    let imgHtml = '';
                    if (s.images.length > 0) {
                        let cols = s.images.length === 1 ? 1 : 2;
                        imgHtml = `<div class="flex-1 w-full grid min-h-0" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr)); gap: 1.4cqw; margin-bottom: 0.9cqw;">`;
                        s.images.forEach(img => {
                            imgHtml += `<div class="w-full h-full flex items-center justify-center overflow-hidden"><img src="${img}" class="max-w-full max-h-full object-contain" /></div>`;
                        });
                        imgHtml += `</div>`;
                    } else {
                        imgHtml = `<div class="flex-1 w-full flex items-center justify-center min-h-0"><div class="text-[9px] text-slate-300 font-bold tracking-widest px-3 py-1 rounded-full border border-slate-200 bg-white shadow-sm">P${p+1} - SLOT ${i+1}</div></div>`;
                    }

                    const qHtml = s.questions ? getPdfLinesHtml(s.questions, textMaxWidthMM) : '';
                    const aHtml = s.answers ? getPdfLinesHtml(s.answers, textMaxWidthMM) : '';

                    pageSlotsHtml += `
                        <div ${activeIdAttr} onclick="goto(${globalIdx})" class="relative flex flex-col cursor-pointer overflow-hidden ${borderClass} ${activeClass}" style="padding: 3.8cqw;">
                            ${imgHtml}
                            <div class="mt-auto flex flex-col w-full shrink-0" style="font-family: ${fonts[activeFont].css};">
                                ${s.questions ? `<div class="font-bold text-black" style="font-size: 1.68cqw; line-height: 1.28; white-space: nowrap; padding-left: 1.4cqw; padding-right: 1.4cqw;">${qHtml}</div>` : ''}
                                ${s.answers ? `<div class="font-bold text-black rounded-md" style="background-color: ${themes[activeTheme].hex}; font-size: 1.68cqw; line-height: 1.42; white-space: nowrap; padding: 1.4cqw; margin-top: 1.4cqw;">${aHtml}</div>` : ''}
                            </div>
                        </div>
                    `;
                }

                fullHtml += `
                    <div class="w-full flex flex-col items-center group relative">
                        <div class="absolute -left-12 top-0 bottom-0 flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="text-xs font-bold text-slate-400 rotate-[-90deg] uppercase tracking-widest whitespace-nowrap">Page ${p + 1}</span>
                        </div>
                        <div class="a4-page rounded-sm bg-white">
                            ${pageSlotsHtml}
                        </div>
                    </div>
                `;
            }

            ui.grid.innerHTML = fullHtml;
            lucide.createIcons();
            
            if (activeIdx === dataStore.length - 1) {
                ui.next.innerHTML = `<span>Save & Add New Page</span> <i data-lucide="file-plus" size="18" class="group-hover:scale-110 transition-transform"></i>`;
            } else {
                ui.next.innerHTML = `<span>Save & Edit Next Slot</span> <i data-lucide="arrow-right" size="18" class="group-hover:translate-x-1 transition-transform"></i>`;
            }
            lucide.createIcons();
        }

        function scrollToActive() {
            setTimeout(() => {
                const el = document.getElementById('active-slot-element');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 50);
        }

        ui.dropZone.onclick = () => ui.file.click();
        
        ui.file.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            files.forEach(file => {
                const r = new FileReader();
                r.onload = (ev) => {
                    dataStore[activeIdx].images.push(ev.target.result);
                    refresh();
                };
                r.readAsDataURL(file);
            });
            ui.file.value = ""; 
        };

        window.removeImage = (imgIdx) => {
            dataStore[activeIdx].images.splice(imgIdx, 1);
            refresh();
        };

        window.goto = (idx) => { 
            activeIdx = idx; 
            refresh(); 
            scrollToActive();
        };

        ui.next.onclick = () => {
            dataStore[activeIdx].questions = ui.q.value;
            dataStore[activeIdx].answers = ui.a.value;
            dataStore[activeIdx].filled = true;
            
            if (activeIdx < dataStore.length - 1) { 
                activeIdx++; 
                refresh();
                scrollToActive();
            } else { 
                addNewPage();
            }
        };

        document.getElementById('clearBtn').onclick = () => {
            if(confirm("Erase all data and reset to 1 page?")) {
                dataStore = [];
                activeIdx = 0;
                addNewPage(true);
            }
        };

        // --- TRUE MULTI-PAGE PDF ENGINE WITH FONT/COLOR INJECTION ---
        async function buildPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> <span>Exporting...</span>`;

            const doc = new jsPDF('p', 'mm', 'a4');
            const cW = 210 / 2, cH = 297 / 3;
            const pad = 8; 

            // Get selected color RGB for jsPDF
            const activeRGB = themes[activeTheme].rgb;
            // Get selected font for jsPDF (helvetica, times, courier)
            const activeJsPdfFont = fonts[activeFont].jspdf;

            const totalPages = dataStore.length / 6;

            for (let p = 0; p < totalPages; p++) {
                if (p > 0) doc.addPage(); 

                doc.setDrawColor(0);
                doc.setLineWidth(0.4);
                doc.line(cW, 0, cW, 297);
                doc.line(0, cH, 210, cH);
                doc.line(0, cH * 2, 210, cH * 2);

                for (let i = 0; i < 6; i++) {
                    const globalIdx = (p * 6) + i;
                    const s = dataStore[globalIdx];
                    
                    const x = (i % 2) * cW;
                    const y = Math.floor(i / 2) * cH;

                    let aBoxH = 0;
                    let aBoxY = y + cH - pad; 
                    let aLines = [];

                    if (s.answers) {
                        doc.setFont(activeJsPdfFont, "bold");
                        aLines = doc.splitTextToSize(s.answers, cW - (pad * 2) - 6); 
                        aBoxH = (aLines.length * 5) + 6; 
                        aBoxY = y + cH - pad - aBoxH; 
                        
                        // Use dynamic theme color!
                        doc.setFillColor(activeRGB[0], activeRGB[1], activeRGB[2]); 
                        doc.rect(x + pad, aBoxY, cW - (pad * 2), aBoxH, 'F');
                        
                        doc.setFontSize(10);
                        doc.setTextColor(0);
                        doc.text(aLines, x + pad + 3, aBoxY + 5.5);
                    }

                    let qH = 0;
                    let qY = aBoxY; 
                    let qLines = [];

                    if (s.questions) {
                        doc.setFont(activeJsPdfFont, "bold");
                        qLines = doc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                        qH = qLines.length * 4.5;
                        qY = s.answers ? (aBoxY - 3 - qH) : (y + cH - pad - qH);
                        
                        doc.setFontSize(10);
                        doc.setTextColor(0);
                        doc.text(qLines, x + pad + 3, qY + 3.5); 
                    }

                    if (s.images.length > 0) {
                        let maxAvailableHeight = qY - y - pad - 2; 
                        let maxAvailableWidth = cW - (pad * 2);
                        
                        let cols = s.images.length === 1 ? 1 : 2; 
                        let rows = Math.ceil(s.images.length / cols);
                        let gap = 3; 
                        
                        let cellW = (maxAvailableWidth - (cols - 1) * gap) / cols;
                        let cellH = (maxAvailableHeight - (rows - 1) * gap) / rows;

                        s.images.forEach((imgSrc, idx) => {
                            try {
                                const imgR = Math.floor(idx / cols);
                                const imgC = idx % cols;
                                
                                const props = doc.getImageProperties(imgSrc);
                                const ratio = props.height / props.width;
                                
                                let finalW = cellW;
                                let finalH = finalW * ratio;
                                
                                if (finalH > cellH) {
                                    finalH = cellH;
                                    finalW = finalH / ratio;
                                }
                                
                                const cellXStart = x + pad + (imgC * (cellW + gap));
                                const cellYStart = y + pad + (imgR * (cellH + gap));
                                
                                const cx = cellXStart + (cellW - finalW) / 2;
                                const cy = cellYStart + (cellH - finalH) / 2;
                                
                                doc.addImage(imgSrc, 'JPEG', cx, cy, finalW, finalH, undefined, 'FAST');
                            } catch(err) {
                                console.error("Image draw error", err);
                            }
                        });
                    }
                }
            }

            doc.save(`Medical_Cases_Sheet_${Date.now()}.pdf`);
            btn.disabled = false;
            btn.innerHTML = original;
            lucide.createIcons();
        }

        document.getElementById('downloadBtn').onclick = buildPDF;
    </script>
</body>
</html>
