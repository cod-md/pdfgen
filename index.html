
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Summary Builder | منشئ الملخصات الطبية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kite+One&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Noto Kufi Arabic', 'Inter', sans-serif; 
            background-color: #F7F7F5; 
            color: #37352F;
            min-height: 100vh;
        }
        
        html[lang="en"] body {
            font-family: 'Inter', sans-serif;
        }

        #previewScrollArea {
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E9E9E7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D3D3D1; }
        
        .a4-wrapper {
            aspect-ratio: 1 / 1.4142;
            width: 100%;
            background-color: white;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .a4-page {
            width: 794px; 
            height: 1123px; 
            background-color: white;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
        }

        html[dir="rtl"] .a4-page-scaled {
            transform-origin: top right;
            right: 0;
            left: auto;
        }
        
        .active-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #3b82f6;
            background-color: rgba(59, 130, 246, 0.03);
            pointer-events: none;
            z-index: 10;
        }

        textarea { transition: border-color 0.1s ease; }
        textarea:focus { border-color: #9B9A97 !important; box-shadow: none !important; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-[1300px] mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6 bg-white p-4 md:px-6 rounded-lg border border-[#E9E9E7] shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded bg-[#F7F7F5] border border-[#E9E9E7] flex items-center justify-center shrink-0">
                    <i data-lucide="layout-template" class="text-[#37352F] w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-[#37352F]" data-i18n="title">
                        Medical Summary Builder
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <!-- Language Toggle -->
                <button onclick="toggleLang()" class="flex items-center gap-1.5 px-3 py-1.5 bg-[#F7F7F5] hover:bg-[#E9E9E7] text-[#37352F] rounded text-sm font-bold transition-all border border-[#E9E9E7]">
                    <i data-lucide="globe" size="16"></i>
                    <span id="langToggleText">العربية</span>
                </button>
                
                <div class="w-px h-5 bg-[#E9E9E7] mx-1 hidden md:block"></div>

                <button id="clearBtn" class="px-3 py-1.5 text-[#9B9A97] hover:text-[#EB5757] hover:bg-[#FFF3F3] rounded text-sm font-medium transition-all">
                    <span data-i18n="clearAll">Clear All</span>
                </button>
                <button onclick="addNewPage()" class="flex items-center gap-1.5 bg-white hover:bg-[#F7F7F5] text-[#37352F] px-4 py-2 rounded text-sm font-medium transition-all border border-[#E9E9E7] shadow-sm">
                    <i data-lucide="file-plus" size="16"></i>
                    <span data-i18n="addPage">Add Page</span>
                </button>
                <button id="downloadBtn" class="flex items-center gap-1.5 bg-[#2F3437] hover:bg-[#191919] text-white px-5 py-2 rounded text-sm font-medium shadow-sm transition-all active:scale-95">
                    <i data-lucide="printer" size="16"></i>
                    <span data-i18n="exportPDF">Export PDF</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Editor Panel -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white rounded-lg shadow-sm border border-[#E9E9E7] overflow-hidden sticky top-8 flex flex-col">
                    
                    <div class="bg-[#F7F7F5] px-5 py-3 border-b border-[#E9E9E7] flex justify-between items-center">
                        <div class="flex flex-col gap-0.5">
                            <span class="font-bold text-sm flex items-center gap-1.5 text-[#37352F]">
                                <span data-i18n="editPageLabel">Editing: Slot</span> <span id="slotLabel" class="bg-white px-2 py-0.5 rounded border border-[#E9E9E7] text-[#37352F]">1</span>
                            </span>
                        </div>
                        <span class="text-xs text-[#9B9A97] font-medium" id="totalSlotsCount">Total: 6 slots</span>
                    </div>

                    <!-- Styling Bar with Dynamic Resize Button -->
                    <div class="bg-white px-5 py-3 border-b border-[#E9E9E7] flex flex-wrap justify-between items-center gap-4">
                        <div class="flex items-center gap-3 flex-wrap">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider" data-i18n="boxColor">Box:</span>
                            <div class="flex gap-2" id="colorSwatches"></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider" data-i18n="fontStyle">Font:</span>
                            <div class="relative flex items-center">
                                <select id="fontSelect" onchange="changeFont(this.value)" class="appearance-none text-xs font-bold border border-[#E9E9E7] rounded-lg ps-3 pe-8 py-1.5 bg-white hover:bg-[#F9F9F8] outline-none text-[#37352F] cursor-pointer transition-all shadow-sm focus:ring-2 focus:ring-[#E9E9E7]">
                                    <option value="sans" data-i18n="fontSans">Modern</option>
                                    <option value="serif" data-i18n="fontSerif">Classic</option>
                                    <option value="mono" data-i18n="fontMono">Mono</option>
                                    <option value="kite" data-i18n="fontKite">Kite One</option>
                                </select>
                                <div class="absolute pointer-events-none flex items-center justify-center end-2">
                                    <i data-lucide="chevron-down" size="14" class="text-[#9B9A97]"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2 w-full pt-2 border-t border-[#F7F7F5]">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider" data-i18n="layoutMode">Layout:</span>
                            
                            <!-- NEW AUTO RESIZE BUTTON -->
                            <button id="autoSizeBtn" onclick="toggleAutoResize()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all border border-[#E9E9E7] bg-white text-[#37352F] hover:bg-[#F9F9F8] shadow-sm flex-1 justify-center">
                                <i data-lucide="maximize" size="14"></i>
                                <span data-i18n="autoFit">Auto Fit (Prevents Text Cutoff)</span>
                            </button>

                            <select id="gridSelect" onchange="changeGrid(this.value)" class="appearance-none text-xs font-bold border border-[#E9E9E7] rounded-md px-3 py-1.5 bg-white outline-none text-[#37352F] cursor-pointer shadow-sm text-center flex-1">
                                <option value="2">2 Slots</option>
                                <option value="4">4 Slots</option>
                                <option value="6" selected>6 Slots (Default)</option>

                            </select>

                    <div class="p-6 space-y-6">

                            </div>
                            
                            <div id="thumbContainer" class="hidden w-full bg-[#F7F7F5] border border-[#E9E9E7] rounded-md p-2 mb-2 flex gap-2 overflow-x-auto thumb-scroll"></div>

                            <div id="dropZone" onclick="document.getElementById('fileInput').click()" class="relative group w-full h-28 rounded-md border border-dashed border-[#D3D3D1] bg-[#F7F7F5] flex flex-col items-center justify-center cursor-pointer hover:border-[#9B9A97] transition-all overflow-hidden">

                        </div>

                        <!-- الأسئلة -->

                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">2.</span> <span data-i18n="questionsText">Questions Text</span>
                                </label>
                            </div>
                            <textarea id="qInput" oninput="saveText()" dir="auto" class="w-full h-20 p-3 rounded-md border border-[#E9E9E7] bg-[#F7F7F5] outline-none text-sm font-semibold resize-none text-[#37352F] placeholder:text-[#D3D3D1]" placeholder="A) What is the diagnosis?&#10;B) Describe the findings."></textarea>
                        </div>

                        <!-- الأجوبة -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">3.</span> <span data-i18n="answersText">Answers (Colored Box)</span>
                                </label>
                            </div>
                            <textarea id="aInput" oninput="saveText()" dir="auto" class="w-full h-20 p-3 rounded-md border outline-none text-sm text-[#37352F] font-bold resize-none" placeholder="A) Iron deficiency anemia&#10;B) Microcytic, hypochromic"></textarea>
                        </div>

                        <button id="nextBtn" onclick="nextSlot()" class="w-full bg-[#2F3437] hover:bg-[#191919] text-white py-3 rounded-md font-medium text-sm flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm"></button>
                    </div>
                </div>
            </div>

            <!-- لوحة المعاينة -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-6rem)]">
                <div class="flex justify-between items-end mb-3 shrink-0 px-1">
                    <div>
                        <h3 class="text-sm font-bold text-[#37352F] mb-0.5" data-i18n="previewTitle">Interactive Workspace Preview</h3>
                    </div>
                </div>
                
                <div id="previewScrollArea" class="bg-[#EFEFED] p-4 sm:p-8 rounded-lg border border-[#E9E9E7] overflow-y-auto thumb-scroll flex-1 shadow-inner relative">
                    <div id="gridPreview" class="relative flex flex-col gap-10 items-center w-full max-w-3xl mx-auto pb-8 z-10">

        <!-- تذييل الصفحة -->

                <span data-i18n="addedBy">Added by Muhammad Saadoon |</span>
                <a href="https://t.me/anemd" target="_blank" rel="noopener noreferrer" class="text-[#37352F] hover:text-[#0088cc] font-bold transition-colors inline-flex items-center gap-1">
                    @anemd
                </a>
            </p>
        </footer>

    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let activeIdx = 0;
        let dataStore = [];
        let currentLang = 'en';
        
        // Settings
        let slotsPerPage = 6;
        let isAutoResize = false; // New Auto-Fit Mode Flag

        const themes = {
            pink:   { bg: '#FBE4E4', border: '#F5E6E6', rgb: [251, 228, 228], name: 'Pink' },
            blue:   { bg: '#E4F0FB', border: '#E6EEF5', rgb: [228, 240, 251], name: 'Blue' },
            green:  { bg: '#E4FBEA', border: '#E6F5E9', rgb: [228, 251, 234], name: 'Green' },
            yellow: { bg: '#FBF4E4', border: '#F5EFE6', rgb: [251, 244, 228], name: 'Yellow' },
            purple: { bg: '#EBE4FB', border: '#EAE6F5', rgb: [235, 228, 251], name: 'Purple' }
        };

        const fonts = {
            sans:  { css: "'Inter', 'Noto Kufi Arabic', sans-serif", jspdf: "helvetica" },
            serif: { css: "Georgia, 'Noto Naskh Arabic', serif", jspdf: "times" },
            mono:  { css: "'Courier New', Courier, monospace", jspdf: "courier" },
            kite:  { css: "'Kite One', sans-serif", jspdf: "helvetica" }
        };

        let activeTheme = 'pink';
        let activeFont = 'sans';

        const i18n = {
            ar: {
                title: "منشئ الملخصات الطبية",
                clearAll: "مسح الكل",
                addPage: "إضافة خانات",
                exportPDF: "تصدير PDF",
                editPageLabel: "تعديل: خانة",
                totalSlots: "إجمالي الخانات:",
                clinicalImages: "الصور السريرية",
                clickToAdd: "انقر لإضافة الصور",
                addMore: "إضافة المزيد",
                questionsText: "نص الأسئلة",
                questionsPlaceholder: "A) What is the diagnosis?\nب) صف الأعراض.",
                answersText: "الأجوبة (المربع الملون)",
                answersPlaceholder: "A) Iron deficiency anemia",
                saveNext: "حفظ وتعديل الخانة التالية",
                saveNewPage: "حفظ وإضافة خانة جديدة",
                previewTitle: "معاينة مساحة العمل",
                page: "صفحة",
                addedBy: "تمت الإضافة بواسطة Muhammad Saadoon |",
                exporting: "جاري التصدير...",
                boxColor: "اللون:",
                fontStyle: "الخط:",
                fontSans: "حديث (Sans)",
                fontSerif: "كلاسيكي (Serif)",
                fontMono: "آلة كاتبة",
                fontKite: "كايت (Kite)",
                layoutMode: "الشبكة:",
                autoFit: "حجم تلقائي (يمنع قطع النص)",
                slotWord: "خانة"
            },
            en: {
                title: "Medical Summary Builder",
                clearAll: "Clear All",
                addPage: "Add Slots",
                exportPDF: "Export PDF",
                editPageLabel: "Editing: Slot",
                totalSlots: "Total Slots:",
                clinicalImages: "Clinical Images",
                clickToAdd: "Click to add images",
                addMore: "Add more images",
                questionsText: "Questions Text",
                questionsPlaceholder: "A) What is the diagnosis?\nB) Describe findings.",
                answersText: "Answers (Colored Box)",
                answersPlaceholder: "A) Iron deficiency anemia",
                saveNext: "Save & Next Slot",
                saveNewPage: "Save & Add New Slot",
                previewTitle: "Interactive Workspace Preview",
                page: "Page",
                addedBy: "Added by Muhammad Saadoon |",
                exporting: "Exporting...",
                boxColor: "Box Color:",
                fontStyle: "Font:",
                fontSans: "Modern (Sans)",
                fontSerif: "Classic (Serif)",
                fontMono: "Typewriter",
                fontKite: "Kite One",
                layoutMode: "Layout:",
                autoFit: "Auto Fit (Prevents Text Cutoff)",
                slotWord: "Slot"
            }
        };

        const ui = {
            q: document.getElementById('qInput'),
            a: document.getElementById('aInput'),
            grid: document.getElementById('gridPreview'),
            next: document.getElementById('nextBtn'),
            scrollArea: document.getElementById('previewScrollArea')
        };

        const dummyDoc = new jsPDF('p', 'mm', 'a4');

        function toggleAutoResize() {
            isAutoResize = !isAutoResize;
            const btn = document.getElementById('autoSizeBtn');
            const select = document.getElementById('gridSelect');
            if (isAutoResize) {
                btn.classList.add('bg-[#E4F0FB]', 'border-[#b6d4f0]', 'text-blue-700');
                btn.classList.remove('bg-white', 'text-[#37352F]');
                select.disabled = true;
                select.style.opacity = '0.4';
            } else {
                btn.classList.remove('bg-[#E4F0FB]', 'border-[#b6d4f0]', 'text-blue-700');
                btn.classList.add('bg-white', 'text-[#37352F]');
                select.disabled = false;
                select.style.opacity = '1';
            }
            refreshAll();
        }

        // --- NEW DYNAMIC CALCULATION ENGINE ---
        function calculateDynamicLayout() {
            const pages = [];
            let currentPage = [];
            let currentY = 0;
            const pW = 210, pH = 297, pad = 8, cW = pW / 2; // Always 2 cols in Auto mode

            dummyDoc.setFont(fonts[activeFont].jspdf, "bold");

            for (let i = 0; i < dataStore.length; i += 2) {
                const s1 = dataStore[i];
                const s2 = dataStore[i+1]; 

                // Calculates exactly how many millimeters a slot needs to prevent cutoffs
                const getReqH = (s) => {
                    if (!s) return 0;
                    let h = pad; 
                    let hasContent = false;

                    if (s.images.length > 0) {
                        let imgCols = s.images.length === 1 ? 1 : 2;
                        let availW = cW - (pad * 2);
                        let gap = 3;
                        let iW = (availW - (imgCols - 1) * gap) / imgCols;
                        let maxImgH = 0;
                        s.images.forEach(src => {
                            try {
                                const props = dummyDoc.getImageProperties(src);
                                const ratio = props.height / props.width;
                                let fH = iW * ratio;
                                if (fH > maxImgH) maxImgH = fH;
                            } catch(e) {}
                        });
                        if (maxImgH > 130) maxImgH = 130; // Hard cap image height to prevent massive sizes
                        let rows = Math.ceil(s.images.length / imgCols);
                        h += (maxImgH * rows) + (rows - 1)*gap;
                        hasContent = true;
                    }

                    if (s.questions) {
                        dummyDoc.setFontSize(10);
                        let qLines = dummyDoc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                        h += (qLines.length * 4.5) + (hasContent ? 6 : 0); 
                        hasContent = true;
                    }

                    if (s.answers) {
                        dummyDoc.setFontSize(10);
                        let aLines = dummyDoc.splitTextToSize(s.answers, cW - (pad * 2) - 6);
                        h += (aLines.length * 5) + 6 + (hasContent ? 4 : 0); 
                        hasContent = true;
                    }

                    if (!hasContent) h += 40; 
                    return h + pad; 
                };

                const reqH1 = getReqH(s1);
                const reqH2 = getReqH(s2);
                let rowH = Math.max(reqH1, reqH2, pH / 4); // Take tallest of the row, min 1/4 page
                if (rowH > pH - 10) rowH = pH - 10; // Cap to slightly less than page height

                if (currentY + rowH > pH && currentPage.length > 0) {
                    pages.push(currentPage);
                    currentPage = [];
                    currentY = 0;
                }

                currentPage.push({ s1, s2, rowH, y: currentY, rowIdx: currentPage.length });
                currentY += rowH;
            }
            if (currentPage.length > 0) pages.push(currentPage);
            return pages;
        }
        // ----------------------------------------

        function initStylingControls() {
            const swatches = document.getElementById('colorSwatches');
            swatches.innerHTML = Object.keys(themes).map(key => `
                <button onclick="changeTheme('${key}')" 
                    class="w-5 h-5 rounded-full transition-all focus:outline-none ${activeTheme === key ? 'ring-2 ring-[#37352F] ring-offset-1 scale-110' : 'hover:scale-110'}" 
                    style="background-color: ${themes[key].bg}; border: 1px solid ${themes[key].border};" title="${themes[key].name}">
                </button>
            `).join('');
        }

        function changeTheme(key) { activeTheme = key; initStylingControls(); refreshAll(); }
        function changeFont(key) { activeFont = key; refreshAll(); }
        function changeGrid(val) { slotsPerPage = parseInt(val); refreshAll(); }
        
        function saveText() {
            dataStore[activeIdx].questions = ui.q.value;
            dataStore[activeIdx].answers = ui.a.value;
            refreshAll(); 
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('langToggleText').textContent = currentLang === 'ar' ? 'English' : 'العربية';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) el.textContent = i18n[currentLang][key];
            });

            ui.q.setAttribute('placeholder', i18n[currentLang].questionsPlaceholder);
            ui.a.setAttribute('placeholder', i18n[currentLang].answersPlaceholder);
            
            Array.from(document.getElementById('fontSelect').options).forEach(opt => {
                const key = opt.getAttribute('data-i18n');
                if(i18n[currentLang][key]) opt.textContent = i18n[currentLang][key];
            });
            refreshAll();
        }

        function addNewPage(shouldRefresh = true) {
            const addCount = isAutoResize ? 2 : slotsPerPage;
            for(let i = 0; i < addCount; i++) {
                dataStore.push({ id: dataStore.length, images: [], questions: "", answers: "" });
            }
            if (shouldRefresh) {
                activeIdx = dataStore.length - addCount; 
                refreshAll();
                scrollToActive();
            }
        }

        function nextSlot() {
            if (activeIdx < dataStore.length - 1) {
                activeIdx++; refreshAll(); scrollToActive();
            } else { addNewPage(); }
        }

        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const r = new FileReader();
                r.onload = (ev) => {
                    dataStore[activeIdx].images.push(ev.target.result);
                    refreshAll();
                };
                r.readAsDataURL(file);
            });
            e.target.value = "";
        }

        function removeImage(imgIdx) { dataStore[activeIdx].images.splice(imgIdx, 1); refreshAll(); }

        function escapeHtml(t) { return !t ? '' : t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function scalePages() {
            const wrappers = document.querySelectorAll('.a4-wrapper');
            wrappers.forEach(wrapper => {
                const scale = wrapper.clientWidth / 794;
                const page = wrapper.querySelector('.a4-page');
                if (page) page.style.transform = `scale(${scale})`;
            });
            ui.scrollArea.style.opacity = '1';
        }

        function buildSlotHtml(s, globalIdx, borderStyle, isFlex = false) {
            if (!s) return isFlex ? `<div style="width: 50%;"></div>` : '';
            
            let activeClass = globalIdx === activeIdx ? 'active-cell bg-[#FAFAFA]' : 'hover:bg-[#F9F9F8] transition-colors';
            let activeIdAttr = globalIdx === activeIdx ? 'id="active-slot-element"' : '';

            let imgHtml = '';
            if (s.images.length > 0) {
                let cols = s.images.length === 1 ? 1 : 2;
                imgHtml = `<div style="flex: 1; width: 100%; display: grid; grid-template-columns: repeat(${cols}, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; min-height: 0;">`;
                s.images.forEach(img => imgHtml += `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="${img}" style="max-width: 100%; max-height: 100%; object-fit: contain;" /></div>`);
                imgHtml += `</div>`;
            } else {
                imgHtml = `<div style="flex: 1; display: flex; align-items: center; justify-content: center;"><span style="color: #D3D3D1; font-size: 11px; font-weight: bold; text-transform: uppercase;">${i18n[currentLang].slotWord} ${globalIdx+1}</span></div>`;
            }

            const wStyle = isFlex ? `width: 50%;` : ``;

            return `
                <div ${activeIdAttr} onclick="activeIdx=${globalIdx}; refreshAll(); scrollToActive();" class="relative flex flex-col cursor-pointer overflow-hidden ${activeClass}" style="${wStyle} ${borderStyle} padding: 28px; box-sizing: border-box;">
                    ${imgHtml}
                    <div style="margin-top: auto; display: flex; flex-direction: column; width: 100%; flex-shrink: 0;">
                        ${s.questions ? `<div dir="auto" style="font-family: ${fonts[activeFont].css}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 0 12px; margin-bottom: 8px; word-wrap: break-word; text-align: start;">${escapeHtml(s.questions)}</div>` : ''}
                        ${s.answers ? `<div dir="auto" style="font-family: ${fonts[activeFont].css}; background-color: ${themes[activeTheme].bg}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 12px; border-radius: 4px; word-wrap: break-word; text-align: start;">${escapeHtml(s.answers)}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function refreshAll() {
            const item = dataStore[activeIdx];
            document.getElementById('slotLabel').textContent = activeIdx + 1;
            document.getElementById('totalSlotsCount').textContent = `${i18n[currentLang].totalSlots} ${dataStore.length}`;
            
            ui.q.style.fontFamily = fonts[activeFont].css;
            ui.a.style.fontFamily = fonts[activeFont].css;
            ui.a.style.backgroundColor = themes[activeTheme].bg;
            ui.a.style.borderColor = themes[activeTheme].border;

            if (ui.q.value !== item.questions) ui.q.value = item.questions;
            if (ui.a.value !== item.answers) ui.a.value = item.answers;

            const thumbContainer = document.getElementById('thumbContainer');
            const dropZone = document.getElementById('dropZone');
            if (item.images.length > 0) {
                thumbContainer.classList.remove('hidden');
                dropZone.classList.add('h-14'); dropZone.classList.remove('h-28');
                dropZone.querySelector('.dz-text').textContent = i18n[currentLang].addMore;
                thumbContainer.innerHTML = item.images.map((img, i) => `
                    <div class="relative shrink-0 w-12 h-12 bg-white rounded border border-[#E9E9E7] p-1 group">
                        <img src="${img}" class="w-full h-full object-cover rounded-sm" />
                        <button onclick="removeImage(${i})" class="absolute -top-1.5 -right-1.5 bg-[#EB5757] text-white rounded-full p-0.5 group-hover:block hidden transition-colors"><i data-lucide="x" size="10"></i></button>
                    </div>
                `).join('');
            } else {
                thumbContainer.classList.add('hidden');
                dropZone.classList.add('h-28'); dropZone.classList.remove('h-14');
                dropZone.querySelector('.dz-text').textContent = i18n[currentLang].clickToAdd;
            }

            let fullHtml = '';

            if (isAutoResize) {
                // --- DYNAMIC AUTO-FIT HTML RENDER ---
                const pages = calculateDynamicLayout();
                pages.forEach((pageRows, p) => {
                    let pageSlotsHtml = '';
                    pageRows.forEach(row => {
                        const heightPct = (row.rowH / 297) * 100;
                        let btmBorder = row.rowIdx < pageRows.length - 1 ? 'border-bottom: 2px solid #E9E9E7;' : '';
                        let rowHtml = `<div style="display: flex; width: 100%; height: ${heightPct}%; ${btmBorder}">`;
                        
                        const global1 = dataStore.indexOf(row.s1);
                        const global2 = dataStore.indexOf(row.s2);
                        
                        let b1 = 'border-color: #E9E9E7; border-style: solid; border-width: 0; ';
                        if(currentLang === 'ar') b1 += 'border-left-width: 2px; '; else b1 += 'border-right-width: 2px; ';
                        
                        rowHtml += buildSlotHtml(row.s1, global1, b1, true);
                        rowHtml += buildSlotHtml(row.s2, global2, '', true);
                        rowHtml += `</div>`;
                        pageSlotsHtml += rowHtml;
                    });
                    
                    const pageLabelPos = currentLang === 'ar' ? `right: -32px; transform: rotate(90deg);` : `left: -32px; transform: rotate(-90deg);`;
                    fullHtml += `
                        <div class="w-full flex flex-col items-center group relative">
                            <div class="absolute top-0 bottom-0 flex items-center opacity-0 group-hover:opacity-100 transition-opacity" style="${pageLabelPos}">
                                <span class="text-[10px] font-bold text-[#9B9A97] whitespace-nowrap uppercase">${i18n[currentLang].page} ${p + 1}</span>
                            </div>
                            <div class="a4-wrapper"><div class="a4-page a4-page-scaled flex flex-col" id="page-${p}">${pageSlotsHtml}</div></div>
                        </div>`;
                });
            } else {
                // --- STRICT GRID HTML RENDER ---
                const { cols, rows } = getGridLayout(slotsPerPage);
                const totalPages = Math.ceil(dataStore.length / slotsPerPage);
                for (let p = 0; p < totalPages; p++) {
                    let pageSlotsHtml = '';
                    let gridStyle = `display: grid; grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr);`;

                    for (let i = 0; i < slotsPerPage; i++) {
                        const globalIdx = (p * slotsPerPage) + i;
                        if (globalIdx >= dataStore.length) continue;
                        const s = dataStore[globalIdx];
                        
                        let border = 'border-color: #E9E9E7; border-style: solid; border-width: 0;';
                        if (cols > 1 && (i % cols === 0)) {
                            if(currentLang === 'ar') border += ' border-left-width: 2px;'; else border += ' border-right-width: 2px;';
                        }
                        if (rows > 1 && i < (slotsPerPage - cols)) border += ' border-bottom-width: 2px;';
                        // 2 cols right edge exception
                        if (cols === 2 && i % 2 === 0) {
                            if(currentLang === 'ar') border += ' border-left-width: 2px; border-right-width: 0;'; else border += ' border-right-width: 2px; border-left-width: 0;';
                        }

                        pageSlotsHtml += buildSlotHtml(s, globalIdx, border, false);
                    }

                    const pageLabelPos = currentLang === 'ar' ? `right: -32px; transform: rotate(90deg);` : `left: -32px; transform: rotate(-90deg);`;
                    fullHtml += `
                        <div class="w-full flex flex-col items-center group relative">
                            <div class="absolute top-0 bottom-0 flex items-center opacity-0 group-hover:opacity-100 transition-opacity" style="${pageLabelPos}">
                                <span class="text-[10px] font-bold text-[#9B9A97] whitespace-nowrap uppercase">${i18n[currentLang].page} ${p + 1}</span>
                            </div>
                            <div class="a4-wrapper"><div class="a4-page a4-page-scaled" id="page-${p}" style="${gridStyle}">${pageSlotsHtml}</div></div>
                        </div>`;
                }
            }

            ui.grid.innerHTML = fullHtml;
            requestAnimationFrame(scalePages);
            
            const isLast = activeIdx === dataStore.length - 1;
            ui.next.innerHTML = `<span>${isLast ? i18n[currentLang].saveNewPage : i18n[currentLang].saveNext}</span> <i data-lucide="${isLast ? 'file-plus' : (currentLang === 'ar' ? 'arrow-left' : 'arrow-right')}" size="16"></i>`;
            lucide.createIcons();
        }

        async function buildPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true; const original = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> <span>${i18n[currentLang].exporting}</span>`;

            try {
                const doc = new jsPDF('p', 'mm', 'a4');
                const pW = 210, pH = 297, pad = 8;
                const rgb = themes[activeTheme].rgb, fName = fonts[activeFont].jspdf;

                // Shared Draw Function for both modes
                const drawSlotContent = (s, x, y, cW, cH) => {
                    if (!s) return;
                    let aBoxH = 0, aBoxY = y + cH - pad, aLines = [];
                    if (s.answers) {
                        doc.setFont(fName, "bold"); doc.setFontSize(10);
                        aLines = doc.splitTextToSize(s.answers, cW - (pad * 2) - 6); 
                        aBoxH = (aLines.length * 5) + 6; aBoxY = y + cH - pad - aBoxH; 
                        doc.setFillColor(rgb[0], rgb[1], rgb[2]); doc.rect(x + pad, aBoxY, cW - (pad * 2), aBoxH, 'F');
                        doc.setTextColor(55, 53, 47); doc.text(aLines, x + pad + 3, aBoxY + 5.5);
                    }

                    let qH = 0, qY = aBoxY, qLines = [];
                    if (s.questions) {
                        doc.setFont(fName, "bold"); doc.setFontSize(10);
                        qLines = doc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                        qH = qLines.length * 4.5; qY = s.answers ? (aBoxY - 3 - qH) : (y + cH - pad - qH);
                        doc.setTextColor(55, 53, 47); doc.text(qLines, x + pad + 3, qY + 3.5); 
                    }

                    if (s.images.length > 0) {
                        let availH = qY - y - pad - 2, availW = cW - (pad * 2);
                        let imgCols = s.images.length === 1 ? 1 : 2;
                        let imgRows = Math.ceil(s.images.length / imgCols);
                        let gap = 3, iW = (availW - (imgCols - 1)*gap) / imgCols, iH = (availH - (imgRows - 1)*gap) / imgRows;

                        s.images.forEach((src, idx) => {
                            try {
                                const props = doc.getImageProperties(src);
                                const ratio = props.height / props.width;
                                let fW = iW, fH = fW * ratio;
                                if (fH > iH) { fH = iH; fW = fH / ratio; }
                                const cx = x + pad + (idx % imgCols) * (iW + gap) + (iW - fW) / 2;
                                const cy = y + pad + Math.floor(idx / imgCols) * (iH + gap) + (iH - fH) / 2;
                                doc.addImage(src, 'JPEG', cx, cy, fW, fH, undefined, 'FAST');
                            } catch(e) {}
                        });
                    }
                };

                if (isAutoResize) {
                    // AUTO MODE DRAWING
                    const pages = calculateDynamicLayout();
                    const cW = pW / 2;
                    pages.forEach((pageRows, pIdx) => {
                        if (pIdx > 0) doc.addPage();
                        doc.setDrawColor(233, 233, 231); doc.setLineWidth(0.3);
                        doc.line(cW, 0, cW, pH); // Center line
                        
                        pageRows.forEach(row => {
                            if (row.rowIdx < pageRows.length - 1) {
                                doc.line(0, row.y + row.rowH, pW, row.y + row.rowH); // Bottom line
                            }
                            drawSlotContent(row.s1, 0, row.y, cW, row.rowH);
                            drawSlotContent(row.s2, cW, row.y, cW, row.rowH);
                        });
                    });
                } else {
                    // STRICT GRID DRAWING
                    const { cols, rows } = getGridLayout(slotsPerPage);
                    const cW = pW / cols, cH = pH / rows;
                    const totalPages = Math.ceil(dataStore.length / slotsPerPage);

                    for (let p = 0; p < totalPages; p++) {
                        if (p > 0) doc.addPage();
                        doc.setDrawColor(233, 233, 231); doc.setLineWidth(0.3);
                        for(let c=1; c<cols; c++) doc.line(c*cW, 0, c*cW, pH);
                        for(let r=1; r<rows; r++) doc.line(0, r*cH, pW, r*cH);

                        for (let i = 0; i < slotsPerPage; i++) {
                            const globalIdx = (p * slotsPerPage) + i;
                            if (globalIdx >= dataStore.length) continue;
                            const s = dataStore[globalIdx];
                            const x = (i % cols) * cW, y = Math.floor(i / cols) * cH;
                            drawSlotContent(s, x, y, cW, cH);
                        }
                    }
                }

                doc.save(`Medical_Summary_${Date.now()}.pdf`);
            } catch (error) {
                console.error(error); alert(i18n[currentLang].exportError);
            } finally {
                btn.disabled = false; btn.innerHTML = original; lucide.createIcons();
            }
        }

        document.getElementById('clearBtn').onclick = () => {
            if(confirm(i18n[currentLang].confirmClear)) { dataStore = []; activeIdx = 0; addNewPage(true); }
        };

        window.addEventListener('resize', scalePages);
        (function init() {
            initStylingControls();
            addNewPage(false);
            refreshAll();
        })();
    </script>
</body>
</html>
