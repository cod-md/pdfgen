
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Summary Builder | منشئ الملخصات الطبية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Noto Kufi Arabic', 'Inter', sans-serif; 
            background-color: #F7F7F5; 
            color: #37352F;
            min-height: 100vh;
        }
        
        /* Language specific default fonts */
        html[lang="en"] body {
            font-family: 'Inter', sans-serif;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E9E9E7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D3D3D1; }
        
        .a4-wrapper {
            aspect-ratio: 1 / 1.4142;
            width: 100%;
            background-color: white;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .a4-page {
            width: 794px;
            height: 1123px;
            background-color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            box-sizing: border-box;
        }

        html[dir="rtl"] .a4-page-scaled {
            position: absolute;
            top: 0;
            right: 0;
            transform-origin: top right;
        }
        
        html[dir="ltr"] .a4-page-scaled {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
        }
        
        .active-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #37352F;
            background-color: rgba(55, 53, 47, 0.02);
            pointer-events: none;
            z-index: 10;
        }

        textarea { 
            transition: all 0.1s ease; 
        }
        textarea:focus { border-color: #9B9A97 !important; box-shadow: none !important; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-[1300px] mx-auto">
        <!-- شريط الرأس العلوي -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6 bg-white p-4 md:px-6 rounded-lg border border-[#E9E9E7] shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded bg-[#F7F7F5] border border-[#E9E9E7] flex items-center justify-center shrink-0">
                    <i data-lucide="layout-template" class="text-[#37352F] w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-[#37352F]" data-i18n="title">
                        Medical Summary Builder
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <!-- زر تبديل اللغة -->
                <button onclick="toggleLang()" class="flex items-center gap-1.5 px-3 py-1.5 bg-[#F7F7F5] hover:bg-[#E9E9E7] text-[#37352F] rounded text-sm font-bold transition-all border border-[#E9E9E7]">
                    <i data-lucide="globe" size="16"></i>
                    <span id="langToggleText">العربية</span>
                </button>
                
                <div class="w-px h-5 bg-[#E9E9E7] mx-1 hidden md:block"></div>

                <button id="clearBtn" class="px-3 py-1.5 text-[#9B9A97] hover:text-[#EB5757] hover:bg-[#FFF3F3] rounded text-sm font-medium transition-all">
                    <span data-i18n="clearAll">Clear All</span>
                </button>
                <button onclick="addNewPage()" class="flex items-center gap-1.5 bg-white hover:bg-[#F7F7F5] text-[#37352F] px-4 py-2 rounded text-sm font-medium transition-all border border-[#E9E9E7] shadow-sm">
                    <i data-lucide="file-plus" size="16"></i>
                    <span data-i18n="addPage">Add Page</span>
                </button>
                <button id="downloadBtn" class="flex items-center gap-1.5 bg-[#2F3437] hover:bg-[#191919] text-white px-5 py-2 rounded text-sm font-medium shadow-sm transition-all active:scale-95">
                    <i data-lucide="printer" size="16"></i>
                    <span data-i18n="exportPDF">Export PDF</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- لوحة المحرر -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white rounded-lg shadow-sm border border-[#E9E9E7] overflow-hidden sticky top-8 flex flex-col">
                    
                    <div class="bg-[#F7F7F5] px-5 py-3 border-b border-[#E9E9E7] flex justify-between items-center">
                        <div class="flex flex-col gap-0.5">
                            <span class="font-bold text-sm flex items-center gap-1.5 text-[#37352F]">
                                <span data-i18n="editPageLabel">Editing: Page</span> <span id="pageLabel" class="text-[#37352F] font-bold">1</span><span data-i18n="slotPrefixLabel">, Slot</span> <span id="slotLabel" class="bg-white px-2 py-0.5 rounded border border-[#E9E9E7] text-[#37352F]">1</span>
                            </span>
                        </div>
                        <span class="text-xs text-[#9B9A97] font-medium" id="totalSlotsCount">Total: 6 slots</span>
                    </div>

                    <!-- شريط إعدادات الألوان والخطوط (Styling Bar) -->
                    <div class="bg-white px-5 py-3 border-b border-[#E9E9E7] flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider" data-i18n="boxColor">Box Color:</span>
                            <div class="flex gap-2" id="colorSwatches">
                                <!-- سيتم حقن الألوان عبر الجافاسكربت -->
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider" data-i18n="fontStyle">Font:</span>
                            <select id="fontSelect" onchange="changeFont(this.value)" class="text-xs border border-[#E9E9E7] rounded px-2 py-1 bg-[#F7F7F5] outline-none text-[#37352F] cursor-pointer font-medium hover:bg-[#E9E9E7] transition-colors">
                                <option value="sans" data-i18n="fontSans">Modern (Sans)</option>
                                <option value="serif" data-i18n="fontSerif">Classic (Serif)</option>
                                <option value="mono" data-i18n="fontMono">Typewriter (Mono)</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-6 space-y-6">
                        
                        <!-- رفع الصور -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">1.</span> <span data-i18n="clinicalImages">Clinical Images</span>
                                </label>
                            </div>
                            
                            <div id="thumbContainer" class="hidden w-full bg-[#F7F7F5] border border-[#E9E9E7] rounded-md p-2 mb-2 flex gap-2 overflow-x-auto thumb-scroll"></div>

                            <div id="dropZone" class="relative group w-full h-28 rounded-md border border-dashed border-[#D3D3D1] bg-[#F7F7F5] flex flex-col items-center justify-center cursor-pointer hover:border-[#9B9A97] transition-all overflow-hidden">
                                <div class="flex flex-col items-center relative z-10">
                                    <i data-lucide="image-plus" class="text-[#9B9A97] w-5 h-5 mb-2 group-hover:text-[#37352F] transition-colors"></i>
                                    <span class="dz-text text-xs text-[#37352F] font-medium" data-i18n="clickToAdd">Click to add images</span>
                                </div>
                                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
                            </div>
                        </div>

                        <!-- الأسئلة -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">2.</span> <span data-i18n="questionsText">Questions Text</span>
                                </label>
                            </div>
                            <textarea id="qInput" dir="auto" class="w-full h-20 p-3 rounded-md border border-[#E9E9E7] bg-[#F7F7F5] outline-none text-sm font-semibold resize-none text-[#37352F] placeholder:text-[#D3D3D1]" placeholder="A) What is the diagnosis?&#10;B) Describe the findings."></textarea>
                        </div>

                        <!-- الأجوبة -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">3.</span> <span data-i18n="answersText">Answers (Colored Box)</span>
                                </label>
                            </div>
                            <textarea id="aInput" dir="auto" class="w-full h-20 p-3 rounded-md border outline-none text-sm text-[#37352F] font-bold resize-none" placeholder="A) Iron deficiency anemia&#10;B) Microcytic, hypochromic"></textarea>
                        </div>

                        <button id="nextBtn" class="w-full bg-[#2F3437] hover:bg-[#191919] text-white py-3 rounded-md font-medium text-sm flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
                            <!-- يتم إنشاؤه برمجياً -->
                        </button>
                    </div>
                </div>
            </div>

            <!-- لوحة المعاينة -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-6rem)]">
                <div class="flex justify-between items-end mb-3 shrink-0 px-1">
                    <div>
                        <h3 class="text-sm font-bold text-[#37352F] mb-0.5" data-i18n="previewTitle">Interactive Workspace Preview</h3>
                    </div>
                </div>
                
                <div id="previewScrollArea" class="bg-[#EFEFED] p-4 sm:p-8 rounded-lg border border-[#E9E9E7] overflow-y-auto thumb-scroll flex-1 shadow-inner relative">
                    <div id="gridPreview" class="relative flex flex-col gap-10 items-center w-full max-w-3xl mx-auto pb-8 z-10">
                        <!-- الصفحات تضاف هنا -->
                    </div>
                </div>
            </div>
        </div>

        <!-- تذييل الصفحة -->
        <footer class="mt-8 pt-5 border-t border-[#E9E9E7] text-center" dir="ltr">
            <p class="text-sm text-[#9B9A97] font-medium" style="font-family: 'Inter', sans-serif;">
                <span data-i18n="addedBy">Added by Muhammad Saadoon |</span>
                <a href="https://t.me/anemd" target="_blank" rel="noopener noreferrer" class="text-[#37352F] hover:text-[#0088cc] font-bold transition-colors inline-flex items-center gap-1">
                    @anemd
                </a>
            </p>
        </footer>

    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let activeIdx = 0;
        let dataStore = [];
        let currentLang = 'en';

        // --- إعدادات الألوان والخطوط الجديدة ---
        const themes = {
            pink: { bg: '#FBE4E4', border: '#F5E6E6', name: 'Soft Pink' },
            blue: { bg: '#E4F0FB', border: '#E6EEF5', name: 'Ice Blue' },
            green: { bg: '#E4FBEA', border: '#E6F5E9', name: 'Mint Green' },
            yellow: { bg: '#FBF4E4', border: '#F5EFE6', name: 'Warm Yellow' },
            purple: { bg: '#EBE4FB', border: '#EAE6F5', name: 'Lavender' },
            gray: { bg: '#F0F0F0', border: '#EAEAEA', name: 'Neutral Gray' }
        };

        const fonts = {
            sans: "'Inter', 'Noto Kufi Arabic', sans-serif",
            serif: "Georgia, 'Noto Naskh Arabic', serif",
            mono: "'Courier New', Courier, monospace"
        };

        let activeTheme = 'pink';
        let activeFont = 'sans';

        const i18n = {
            ar: {
                title: "منشئ الملخصات الطبية",
                clearAll: "مسح الكل",
                addPage: "إضافة صفحة",
                exportPDF: "تصدير PDF",
                editPageLabel: "تعديل: صفحة",
                slotPrefixLabel: "، خانة",
                totalSlots: "المجموع:",
                clinicalImages: "الصور السريرية",
                clickToAdd: "انقر لإضافة الصور",
                addMore: "إضافة المزيد من الصور",
                questionsText: "نص الأسئلة",
                questionsPlaceholder: "A) What is the diagnosis?\nب) صف الأعراض الظاهرة في الصورة.",
                answersText: "الأجوبة (المربع الملون)",
                answersPlaceholder: "A) Iron deficiency anemia\nب) فقر الدم بسبب نقص الحديد",
                saveNext: "حفظ وتعديل الخانة التالية",
                saveNewPage: "حفظ وإضافة صفحة جديدة",
                previewTitle: "معاينة مساحة العمل التفاعلية",
                page: "صفحة",
                addedBy: "تمت الإضافة بواسطة Muhammad Saadoon |",
                confirmClear: "هل أنت متأكد من رغبتك في مسح كافة البيانات والعودة لصفحة واحدة فارغة؟",
                exporting: "جاري التصدير...",
                exportError: "حدث خطأ أثناء التصدير. يرجى المحاولة مرة أخرى.",
                slotWord: "خانة",
                boxColor: "لون المربع:",
                fontStyle: "الخط:",
                fontSans: "حديث (Sans)",
                fontSerif: "كلاسيكي (Serif)",
                fontMono: "آلة كاتبة (Mono)"
            },
            en: {
                title: "Medical Summary Builder",
                clearAll: "Clear All",
                addPage: "Add Page",
                exportPDF: "Export PDF",
                editPageLabel: "Editing: Page",
                slotPrefixLabel: ", Slot",
                totalSlots: "Total:",
                clinicalImages: "Clinical Images",
                clickToAdd: "Click to add images",
                addMore: "Add more images",
                questionsText: "Questions Text",
                questionsPlaceholder: "A) What is the diagnosis?\nB) Describe the findings.",
                answersText: "Answers (Colored Box)",
                answersPlaceholder: "A) Iron deficiency anemia\nB) Microcytic, hypochromic",
                saveNext: "Save & Edit Next Slot",
                saveNewPage: "Save & Add New Page",
                previewTitle: "Interactive Workspace Preview",
                page: "Page",
                addedBy: "Added by Muhammad Saadoon |",
                confirmClear: "Are you sure you want to clear all data and reset to a single empty page?",
                exporting: "Exporting...",
                exportError: "An error occurred during export. Please try again.",
                slotWord: "Slot",
                boxColor: "Box Color:",
                fontStyle: "Font:",
                fontSans: "Modern (Sans)",
                fontSerif: "Classic (Serif)",
                fontMono: "Typewriter (Mono)"
            }
        };

        const ui = {
            file: document.getElementById('fileInput'),
            thumbContainer: document.getElementById('thumbContainer'),
            dropZone: document.getElementById('dropZone'),
            q: document.getElementById('qInput'),
            a: document.getElementById('aInput'),
            grid: document.getElementById('gridPreview'),
            next: document.getElementById('nextBtn'),
            slotLabel: document.getElementById('slotLabel'),
            pageLabel: document.getElementById('pageLabel'),
            totalCount: document.getElementById('totalSlotsCount'),
            scrollArea: document.getElementById('previewScrollArea')
        };

        const dummyDoc = new jsPDF('p', 'mm', 'a4');

        function initStylingControls() {
            const swatches = document.getElementById('colorSwatches');
            swatches.innerHTML = Object.keys(themes).map(key => `
                <button onclick="changeTheme('${key}')" 
                    class="w-5 h-5 rounded-full transition-all focus:outline-none ${activeTheme === key ? 'ring-2 ring-[#37352F] ring-offset-1 scale-110' : 'hover:scale-110'}" 
                    style="background-color: ${themes[key].bg}; border: 1px solid ${themes[key].border};" 
                    title="${themes[key].name}">
                </button>
            `).join('');
        }

        function changeTheme(key) {
            activeTheme = key;
            initStylingControls();
            refresh();
        }

        function changeFont(key) {
            activeFont = key;
            refresh();
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            document.getElementById('langToggleText').textContent = currentLang === 'ar' ? 'English' : 'العربية';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });

            document.getElementById('qInput').setAttribute('placeholder', i18n[currentLang].questionsPlaceholder);
            document.getElementById('aInput').setAttribute('placeholder', i18n[currentLang].answersPlaceholder);
            
            refresh();
        }

        // Initialize App
        initStylingControls();
        addNewPage(false);

        function addNewPage(shouldRefresh = true) {
            const startId = dataStore.length;
            for(let i = 0; i < 6; i++) {
                dataStore.push({ id: startId + i, images: [], questions: "", answers: "", filled: false });
            }
            if (shouldRefresh) {
                activeIdx = startId; 
                refresh();
                scrollToActive();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function scalePages() {
            document.querySelectorAll('.a4-wrapper').forEach(wrapper => {
                const scale = wrapper.clientWidth / 794;
                const page = wrapper.querySelector('.a4-page');
                if (page) {
                    page.style.transform = `scale(${scale})`;
                }
            });
        }
        
        window.addEventListener('resize', scalePages);

        function refresh() {
            const item = dataStore[activeIdx];
            
            const currentPage = Math.floor(activeIdx / 6) + 1;
            const currentSlotOnPage = (activeIdx % 6) + 1;

            ui.pageLabel.textContent = currentPage;
            ui.slotLabel.textContent = currentSlotOnPage;
            ui.totalCount.textContent = `${i18n[currentLang].totalSlots} ${dataStore.length}`;
            
            // تطبيق الخطوط والألوان المحددة على حقول الإدخال لتتناسق مع العرض الحي
            ui.q.style.fontFamily = fonts[activeFont];
            ui.a.style.fontFamily = fonts[activeFont];
            ui.a.style.backgroundColor = themes[activeTheme].bg;
            ui.a.style.borderColor = themes[activeTheme].border;

            ui.q.value = item.questions;
            ui.a.value = item.answers;
            
            if (item.images.length > 0) {
                ui.thumbContainer.classList.remove('hidden');
                ui.dropZone.classList.add('h-14');
                ui.dropZone.classList.remove('h-28');
                ui.dropZone.querySelector('.dz-text').textContent = i18n[currentLang].addMore;
                
                ui.thumbContainer.innerHTML = item.images.map((img, i) => `
                    <div class="relative shrink-0 w-12 h-12 bg-white rounded border border-[#E9E9E7] p-1 group">
                        <img src="${img}" class="w-full h-full object-cover rounded-sm" />
                        <button onclick="removeImage(${i})" class="absolute -top-1.5 -right-1.5 bg-[#EB5757] text-white rounded-full p-0.5 hidden group-hover:block hover:bg-rose-600 transition-colors">
                            <i data-lucide="x" size="12"></i>
                        </button>
                    </div>
                `).join('');
            } else {
                ui.thumbContainer.classList.add('hidden');
                ui.dropZone.classList.add('h-28');
                ui.dropZone.classList.remove('h-14');
                ui.dropZone.querySelector('.dz-text').textContent = i18n[currentLang].clickToAdd;
            }

            const textMaxWidthMM = (210 / 2) - 22; 
            const totalPages = dataStore.length / 6;
            let fullHtml = '';

            for (let p = 0; p < totalPages; p++) {
                let pageSlotsHtml = '';
                
                for (let i = 0; i < 6; i++) {
                    const globalIdx = (p * 6) + i;
                    const s = dataStore[globalIdx];
                    
                    let borderStyle = 'border-color: #E9E9E7; border-style: solid; border-width: 0; ';
                    if (i % 2 === 0) {
                        if(currentLang === 'ar') borderStyle += 'border-left-width: 2px; ';
                        else borderStyle += 'border-right-width: 2px; ';
                    }
                    if (i < 4) borderStyle += 'border-bottom-width: 2px; ';
                    
                    let activeClass = globalIdx === activeIdx ? 'active-cell bg-[#FAFAFA]' : 'hover:bg-[#F9F9F8] transition-colors';
                    let activeIdAttr = globalIdx === activeIdx ? 'id="active-slot-element"' : '';

                    let imgHtml = '';
                    if (s.images.length > 0) {
                        let cols = s.images.length === 1 ? 1 : 2;
                        imgHtml = `<div style="flex: 1; width: 100%; display: grid; grid-template-columns: repeat(${cols}, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; min-height: 0;">`;
                        s.images.forEach(img => {
                            imgHtml += `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="${img}" style="max-width: 100%; max-height: 100%; object-fit: contain;" /></div>`;
                        });
                        imgHtml += `</div>`;
                    } else {
                        imgHtml = `<div style="flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 0;"><div style="font-size: 11px; color: #D3D3D1; font-weight: bold; padding: 4px 10px; border-radius: 4px; border: 1px solid #E9E9E7; background: white; text-transform: uppercase;">${currentLang === 'en' ? 'P' : 'ص'}${p+1} - ${i18n[currentLang].slotWord} ${i+1}</div></div>`;
                    }

                    const qHtml = s.questions ? escapeHtml(s.questions) : '';
                    const aHtml = s.answers ? escapeHtml(s.answers) : '';

                    pageSlotsHtml += `
                        <div ${activeIdAttr} onclick="goto(${globalIdx})" class="relative flex flex-col cursor-pointer overflow-hidden ${activeClass}" style="${borderStyle} padding: 28px; box-sizing: border-box;">
                            ${imgHtml}
                            <div style="margin-top: auto; display: flex; flex-direction: column; width: 100%; flex-shrink: 0;">
                                ${s.questions ? `<div dir="auto" style="font-family: ${fonts[activeFont]}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 0 12px; margin-bottom: 8px; word-wrap: break-word; text-align: start;">${qHtml}</div>` : ''}
                                ${s.answers ? `<div dir="auto" style="font-family: ${fonts[activeFont]}; background-color: ${themes[activeTheme].bg}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 12px; border-radius: 4px; word-wrap: break-word; text-align: start;">${aHtml}</div>` : ''}
                            </div>
                        </div>
                    `;
                }

                const pageLabelPos = currentLang === 'ar' ? `right: -32px; transform: rotate(90deg);` : `left: -32px; transform: rotate(-90deg);`;

                fullHtml += `
                    <div class="w-full flex flex-col items-center group relative">
                        <div class="absolute top-0 bottom-0 flex items-center opacity-0 group-hover:opacity-100 transition-opacity" style="${pageLabelPos}">
                            <span class="text-[10px] font-bold text-[#9B9A97] whitespace-nowrap uppercase">${i18n[currentLang].page} ${p + 1}</span>
                        </div>
                        <div class="a4-wrapper">
                            <div class="a4-page a4-page-scaled" id="page-${p}">
                                ${pageSlotsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            ui.grid.innerHTML = fullHtml;
            scalePages(); 
            lucide.createIcons();
            
            const arrowIcon = currentLang === 'ar' ? 'arrow-left' : 'arrow-right';
            if (activeIdx === dataStore.length - 1) {
                ui.next.innerHTML = `<span>${i18n[currentLang].saveNewPage}</span> <i data-lucide="file-plus" size="16"></i>`;
            } else {
                ui.next.innerHTML = `<span>${i18n[currentLang].saveNext}</span> <i data-lucide="${arrowIcon}" size="16"></i>`;
            }
            lucide.createIcons();
        }

        function scrollToActive() {
            setTimeout(() => {
                const el = document.getElementById('active-slot-element');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 50);
        }

        ui.dropZone.onclick = () => ui.file.click();
        
        ui.file.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            files.forEach(file => {
                const r = new FileReader();
                r.onload = (ev) => {
                    dataStore[activeIdx].images.push(ev.target.result);
                    refresh();
                };
                r.readAsDataURL(file);
            });
            ui.file.value = ""; 
        };

        window.removeImage = (imgIdx) => {
            dataStore[activeIdx].images.splice(imgIdx, 1);
            refresh();
        };

        window.goto = (idx) => { 
            activeIdx = idx; 
            refresh(); 
            scrollToActive();
        };

        ui.next.onclick = () => {
            dataStore[activeIdx].questions = ui.q.value;
            dataStore[activeIdx].answers = ui.a.value;
            dataStore[activeIdx].filled = true;
            
            if (activeIdx < dataStore.length - 1) { 
                activeIdx++; 
                refresh();
                scrollToActive();
            } else { 
                addNewPage();
            }
        };

        document.getElementById('clearBtn').onclick = () => {
            if(confirm(i18n[currentLang].confirmClear)) {
                dataStore = [];
                activeIdx = 0;
                addNewPage(true);
            }
        };

        async function buildPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> <span data-i18n="exporting">${i18n[currentLang].exporting}</span>`;

            try {
                const doc = new jsPDF('p', 'mm', 'a4');
                const totalPages = dataStore.length / 6;

                const offscreen = document.createElement('div');
                offscreen.style.position = 'absolute';
                offscreen.style.top = '-9999px';
                offscreen.style.right = currentLang === 'ar' ? '-9999px' : 'auto';
                offscreen.style.left = currentLang === 'en' ? '-9999px' : 'auto';
                offscreen.dir = document.documentElement.dir; 
                document.body.appendChild(offscreen);

                for (let p = 0; p < totalPages; p++) {
                    if (p > 0) doc.addPage(); 
                    
                    const originalPage = document.getElementById(`page-${p}`);
                    const clone = originalPage.cloneNode(true);
                    
                    clone.style.transform = 'none';
                    clone.style.position = 'relative';
                    clone.style.right = 'auto';
                    clone.style.left = 'auto';
                    clone.classList.remove('a4-page-scaled');
                    
                    const activeCells = clone.querySelectorAll('.active-cell');
                    activeCells.forEach(cell => cell.classList.remove('active-cell', 'bg-[#FAFAFA]'));

                    offscreen.innerHTML = '';
                    offscreen.appendChild(clone);

                    await new Promise(r => setTimeout(r, 50));

                    const canvas = await html2canvas(clone, {
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    doc.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                }

                document.body.removeChild(offscreen);
                doc.save(`Medical_Cases_Sheet_${Date.now()}.pdf`);
                
            } catch (error) {
                console.error(error);
                alert(i18n[currentLang].exportError);
            } finally {
                btn.disabled = false;
                btn.innerHTML = original;
                lucide.createIcons();
            }
        }

        document.getElementById('downloadBtn').onclick = buildPDF;
    </script>
</body>
</html>
