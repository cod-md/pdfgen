```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Study Sheet - Sequential Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .grid-preview-cell { transition: all 0.2s ease; }
        .grid-preview-cell:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="stethoscope" class="text-blue-600"></i>
                    Clinical Case Builder
                </h1>
                <p class="text-slate-500">Add 6 cases sequentially to generate your A4 sheet.</p>
            </div>
            <div class="flex gap-3">
                <button id="resetBtn" class="px-4 py-2 text-slate-500 hover:text-slate-800 font-medium text-sm">Clear All</button>
                <button id="downloadBtn" class="flex items-center gap-2 bg-slate-900 hover:bg-black text-white px-6 py-3 rounded-xl font-semibold shadow-xl transition-all active:scale-95 disabled:opacity-50">
                    <i data-lucide="download" size="18"></i>
                    Generate A4 PDF
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left: Sequential Editor (5/12) -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden sticky top-8">
                    <div class="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
                        <h2 class="font-bold flex items-center gap-2">
                            Slot <span id="currentSlotLabel">1</span> of 6
                        </h2>
                        <div class="flex gap-1.5" id="paginationDots"></div>
                    </div>

                    <div class="p-6 space-y-6">
                        <!-- Image Upload -->
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">1. Patient Image</label>
                            <div id="dropZone" class="relative group w-full h-56 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all overflow-hidden">
                                <div id="uploadPlaceholder" class="flex flex-col items-center text-center px-4">
                                    <i data-lucide="image-plus" class="text-slate-300 mb-2 w-8 h-8"></i>
                                    <span class="text-xs text-slate-400">Click to upload image<br>(Aspect ratio is preserved)</span>
                                </div>
                                <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-contain p-2" />
                                <input type="file" id="fileInput" class="hidden" accept="image/*">
                            </div>
                        </div>

                        <!-- Question Input -->
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">2. Questions (Normal Text)</label>
                            <textarea id="qInput" class="w-full h-24 p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-100 outline-none resize-none text-sm" placeholder="A) What is the diagnosis?&#10;B) Describe the microscopic findings"></textarea>
                        </div>

                        <!-- Answer Input -->
                        <div>
                            <label class="block text-[10px] font-bold text-rose-400 uppercase tracking-widest mb-2">3. Answers (Pink Box)</label>
                            <textarea id="aInput" class="w-full h-24 p-3 rounded-xl border border-rose-100 bg-rose-50/50 focus:ring-2 focus:ring-rose-100 outline-none resize-none text-sm text-rose-900 font-medium" placeholder="A) Iron Deficiency Anemia&#10;B) Microcytic, hypochromic cells"></textarea>
                        </div>

                        <button id="registerBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-100 transition-all active:scale-95">
                            Register Slot & Continue
                            <i data-lucide="arrow-right" size="18"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Grid Preview (7/12) -->
            <div class="lg:col-span-7">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">A4 Sheet Preview</h3>
                    <span class="text-[10px] text-slate-400 italic">Click a cell to edit</span>
                </div>
                
                <!-- 2x3 Grid Representation -->
                <div id="gridDisplay" class="grid grid-cols-2 gap-4 bg-slate-200 p-1 rounded-xl border border-slate-200">
                    <!-- Cells injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let activeIdx = 0;
        let slots = Array.from({ length: 6 }, (_, i) => ({
            id: i,
            image: null,
            imgW: 0,
            imgH: 0,
            questions: "",
            answers: "",
            isFilled: false
        }));

        // Elements
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const qInput = document.getElementById('qInput');
        const aInput = document.getElementById('aInput');
        const gridDisplay = document.getElementById('gridDisplay');
        const registerBtn = document.getElementById('registerBtn');
        const currentSlotLabel = document.getElementById('currentSlotLabel');

        function updateUI() {
            renderPagination();
            renderGrid();
            loadSlotData();
            lucide.createIcons();
        }

        function loadSlotData() {
            const data = slots[activeIdx];
            currentSlotLabel.textContent = activeIdx + 1;
            qInput.value = data.questions;
            aInput.value = data.answers;
            
            if (data.image) {
                imagePreview.src = data.image;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
            } else {
                imagePreview.classList.add('hidden');
                uploadPlaceholder.classList.remove('hidden');
            }
        }

        function renderPagination() {
            const container = document.getElementById('paginationDots');
            container.innerHTML = slots.map((s, i) => `
                <div class="w-2 h-2 rounded-full ${i === activeIdx ? 'bg-white w-4' : (s.isFilled ? 'bg-blue-300' : 'bg-blue-800/30')}"></div>
            `).join('');
        }

        function renderGrid() {
            gridDisplay.innerHTML = slots.map((slot, i) => `
                <div onclick="jumpTo(${i})" class="grid-preview-cell aspect-[3/4.2] bg-white rounded-lg p-3 flex flex-col gap-2 cursor-pointer relative border-2 ${i === activeIdx ? 'border-blue-500 ring-2 ring-blue-100' : 'border-transparent shadow-sm'}">
                    <div class="absolute top-1 right-2 text-[8px] font-bold text-slate-300">SLOT ${i+1}</div>
                    
                    <!-- Thumbnail Area -->
                    <div class="h-24 bg-slate-50 rounded border border-slate-100 overflow-hidden flex items-center justify-center">
                        ${slot.image ? `<img src="${slot.image}" class="h-full w-full object-contain" />` : `<i data-lucide="image" class="w-4 h-4 text-slate-200"></i>`}
                    </div>

                    <!-- Text Placeholder -->
                    <div class="flex-1 flex flex-col justify-between overflow-hidden">
                        <div class="space-y-1">
                            <div class="h-1 w-full bg-slate-100 rounded"></div>
                            <div class="h-1 w-2/3 bg-slate-100 rounded"></div>
                        </div>
                        <div class="${slot.answers ? 'bg-rose-50' : 'bg-slate-50'} h-8 rounded p-1 flex items-center">
                            <div class="h-1 w-1/2 ${slot.answers ? 'bg-rose-200' : 'bg-slate-100'} rounded"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Logic
        document.getElementById('dropZone').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        slots[activeIdx].image = re.target.result;
                        slots[activeIdx].imgW = tempImg.width;
                        slots[activeIdx].imgH = tempImg.height;
                        updateUI();
                    };
                    tempImg.src = re.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        window.jumpTo = (idx) => {
            activeIdx = idx;
            updateUI();
        };

        registerBtn.onclick = () => {
            slots[activeIdx].questions = qInput.value;
            slots[activeIdx].answers = aInput.value;
            slots[activeIdx].isFilled = true;
            
            if (activeIdx < 5) {
                activeIdx++;
                updateUI();
            } else {
                renderGrid();
                alert("All slots registered! Ready for PDF download.");
            }
        };

        document.getElementById('resetBtn').onclick = () => {
            if(confirm("Clear everything?")) {
                slots.forEach(s => { s.image = null; s.questions = ""; s.answers = ""; s.isFilled = false; });
                activeIdx = 0;
                updateUI();
            }
        };

        // PDF Generator with Aspect Ratio Preservation
        async function generatePDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> Processing...`;

            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;
            const colW = pageWidth / 2;
            const rowH = pageHeight / 3;
            const pad = 12;

            // Draw Basic Grid Lines
            doc.setDrawColor(0);
            doc.setLineWidth(0.4);
            doc.line(colW, 0, colW, pageHeight);
            doc.line(0, rowH, pageWidth, rowH);
            doc.line(0, rowH * 2, pageWidth, rowH * 2);

            for (let i = 0; i < 6; i++) {
                const s = slots[i];
                const col = i % 2;
                const row = Math.floor(i / 2);
                const startX = col * colW;
                const startY = row * rowH;

                // 1. Image Calculation (Preserve Aspect Ratio)
                if (s.image) {
                    const maxImgW = colW - (pad * 2);
                    const maxImgH = rowH * 0.42; // Up to 42% of slot height
                    
                    let finalW = maxImgW;
                    let finalH = (s.imgH / s.imgW) * finalW;

                    if (finalH > maxImgH) {
                        finalH = maxImgH;
                        finalW = (s.imgW / s.imgH) * finalH;
                    }

                    // Center image horizontally in the slot
                    const centerX = startX + (colW - finalW) / 2;
                    doc.addImage(s.image, 'JPEG', centerX, startY + pad, finalW, finalH, undefined, 'FAST');
                }

                // 2. Questions
                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                const qY = startY + (rowH * 0.52);
                const qLines = doc.splitTextToSize(s.questions || "", colW - (pad * 2));
                doc.text(qLines, startX + pad, qY);

                // 3. Answer Box (Pink)
                if (s.answers) {
                    const aLines = doc.splitTextToSize(s.answers, colW - (pad * 3));
                    const boxH = (aLines.length * 4.8) + 6;
                    const boxY = startY + rowH - boxH - pad;

                    doc.setFillColor(255, 218, 218); // Solid Pink
                    doc.rect(startX + pad, boxY, colW - (pad * 2), boxH, 'F');
                    
                    doc.setFont("helvetica", "bold");
                    doc.text(aLines, startX + pad + 3, boxY + 5);
                }
            }

            doc.save('Medical_Study_Sheet.pdf');
            btn.disabled = false;
            btn.innerHTML = originalText;
            lucide.createIcons();
        }

        document.getElementById('downloadBtn').onclick = generatePDF;

        window.onload = updateUI;
    </script>
</body>
</html>
