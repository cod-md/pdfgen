

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Summary Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global state for app
        window.firebaseApp = null;
        window.db = null;
        window.auth = null;
        window.currentUser = null;
        window.isCloudSyncing = false;

        // Exposed functions to window for global access
        window.saveStateToCloud = async () => {
            if (!window.currentUser || !window.db) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'medical-summary-builder';
            const userId = window.currentUser.uid;
            
            updateSyncStatus(true);
            try {
                // Save settings (theme/font)
                await setDoc(doc(window.db, 'artifacts', appId, 'users', userId, 'settings', 'prefs'), {
                    activeTheme: window.activeTheme,
                    activeFont: window.activeFont,
                    lastUpdated: Date.now()
                });

                // Save dataStore - we save as chunks or individual slots to avoid the 1MB limit
                // For simplicity and speed, we'll save each slot in a collection
                const slotsCol = collection(window.db, 'artifacts', appId, 'users', userId, 'slots');
                for (let i = 0; i < window.dataStore.length; i++) {
                    const slot = window.dataStore[i];
                    // Only save if it has content to save writes
                    if (slot.questions || slot.answers || slot.images.length > 0) {
                        await setDoc(doc(slotsCol, `slot_${i}`), slot);
                    }
                }
            } catch (err) {
                console.error("Cloud save failed:", err);
            } finally {
                setTimeout(() => updateSyncStatus(false), 800);
            }
        };

        window.clearCloudData = async () => {
            if (!window.currentUser || !window.db) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'medical-summary-builder';
            const userId = window.currentUser.uid;
            
            try {
                // Clear settings
                await deleteDoc(doc(window.db, 'artifacts', appId, 'users', userId, 'settings', 'prefs'));
                
                // Clear all slots
                const slotsCol = collection(window.db, 'artifacts', appId, 'users', userId, 'slots');
                const snapshot = await getDocs(slotsCol);
                const deletions = snapshot.docs.map(d => deleteDoc(d.ref));
                await Promise.all(deletions);
            } catch (err) {
                console.error("Cloud clear failed:", err);
            }
        };

        // Initialize Firebase
        const startFirebase = async () => {
            const firebaseConfig = JSON.parse(__firebase_config);
            window.firebaseApp = initializeApp(firebaseConfig);
            window.auth = getAuth(window.firebaseApp);
            window.db = getFirestore(window.firebaseApp);

            // Auth flow
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(window.auth, __initial_auth_token);
            } else {
                await signInAnonymously(window.auth);
            }

            onAuthStateChanged(window.auth, async (user) => {
                if (user) {
                    window.currentUser = user;
                    await loadStateFromCloud();
                }
            });
        };

        const loadStateFromCloud = async () => {
            if (!window.currentUser || !window.db) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'medical-summary-builder';
            const userId = window.currentUser.uid;

            try {
                // Load Settings
                const settingsDoc = await getDoc(doc(window.db, 'artifacts', appId, 'users', userId, 'settings', 'prefs'));
                if (settingsDoc.exists()) {
                    const data = settingsDoc.data();
                    window.activeTheme = data.activeTheme || 'pink';
                    window.activeFont = data.activeFont || 'sans';
                    
                    // Update UI elements
                    document.getElementById('fontSelect').value = window.activeFont;
                    window.initStylingControls();
                }

                // Load Slots
                const slotsCol = collection(window.db, 'artifacts', appId, 'users', userId, 'slots');
                const snapshot = await getDocs(slotsCol);
                
                if (!snapshot.empty) {
                    // Pre-fill dataStore with empty slots if needed
                    let maxIdx = 0;
                    snapshot.docs.forEach(d => {
                        const id = parseInt(d.id.split('_')[1]);
                        if (id > maxIdx) maxIdx = id;
                    });
                    
                    // Ensure enough pages exist
                    const neededPages = Math.ceil((maxIdx + 1) / 6);
                    window.dataStore = []; // Reset local temp store
                    for (let i = 0; i < (neededPages * 6); i++) {
                        window.dataStore.push({ id: i, images: [], questions: "", answers: "", filled: false });
                    }

                    // Fill with data
                    snapshot.docs.forEach(d => {
                        const id = parseInt(d.id.split('_')[1]);
                        window.dataStore[id] = d.data();
                    });
                }
            } catch (err) {
                console.error("Cloud load failed:", err);
            } finally {
                // Initial render
                window.refreshEditor();
                window.refreshPreview();
            }
        };

        function updateSyncStatus(syncing) {
            const el = document.getElementById('syncIndicator');
            if (!el) return;
            if (syncing) {
                el.innerHTML = `<i data-lucide="refresh-cw" class="w-3 h-3 animate-spin text-blue-500"></i><span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Saving...</span>`;
            } else {
                el.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 text-emerald-500"></i><span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Synced</span>`;
            }
            lucide.createIcons();
        }

        startFirebase();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F7F7F5; 
            color: #37352F;
            min-height: 100vh;
        }

        #previewScrollArea {
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E9E9E7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D3D3D1; }
        
        .a4-wrapper {
            aspect-ratio: 1 / 1.4142;
            width: 100%;
            background-color: white;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .a4-page {
            width: 794px;
            height: 1123px;
            background-color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
        }
        
        .active-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #37352F;
            background-color: rgba(55, 53, 47, 0.02);
            pointer-events: none;
            z-index: 10;
        }

        textarea { 
            transition: border-color 0.1s ease; 
        }
        textarea:focus { border-color: #9B9A97 !important; box-shadow: none !important; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-[1300px] mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6 bg-white p-4 md:px-6 rounded-lg border border-[#E9E9E7] shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded bg-[#F7F7F5] border border-[#E9E9E7] flex items-center justify-center shrink-0">
                    <i data-lucide="layout-template" class="text-[#37352F] w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-[#37352F]">
                        Medical Summary Builder
                    </h1>
                    <div id="syncIndicator" class="flex items-center gap-1.5 mt-0.5">
                        <i data-lucide="cloud" class="w-3 h-3 text-slate-300"></i>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Connecting...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <button id="clearBtn" class="px-3 py-1.5 text-[#9B9A97] hover:text-[#EB5757] hover:bg-[#FFF3F3] rounded text-sm font-medium transition-all">
                    Clear All
                </button>
                <div class="w-px h-5 bg-[#E9E9E7] mx-1 hidden md:block"></div>
                <button onclick="addNewPage()" class="flex items-center gap-1.5 bg-white hover:bg-[#F7F7F5] text-[#37352F] px-4 py-2 rounded text-sm font-medium transition-all border border-[#E9E9E7] shadow-sm">
                    <i data-lucide="file-plus" size="16"></i>
                    <span>Add Page</span>
                </button>
                <button id="downloadBtn" class="flex items-center gap-1.5 bg-[#2F3437] hover:bg-[#191919] text-white px-5 py-2 rounded text-sm font-medium shadow-sm transition-all active:scale-95">
                    <i data-lucide="printer" size="16"></i>
                    <span>Export PDF</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Editor -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white rounded-lg shadow-sm border border-[#E9E9E7] overflow-hidden sticky top-8 flex flex-col">
                    
                    <div class="bg-[#F7F7F5] px-5 py-3 border-b border-[#E9E9E7] flex justify-between items-center">
                        <div class="flex flex-col gap-0.5">
                            <span class="font-bold text-sm flex items-center gap-1.5 text-[#37352F]">
                                <span>Editing: Page</span> <span id="pageLabel" class="text-[#37352F] font-bold">1</span><span>, Slot</span> <span id="slotLabel" class="bg-white px-2 py-0.5 rounded border border-[#E9E9E7] text-[#37352F]">1</span>
                            </span>
                        </div>
                        <span class="text-xs text-[#9B9A97] font-medium" id="totalSlotsCount">Total: 6 slots</span>
                    </div>

                    <!-- Toolbar -->
                    <div class="bg-white px-5 py-3 border-b border-[#E9E9E7] flex flex-wrap items-center gap-x-10 gap-y-4">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Box Color:</span>
                            <div class="flex gap-2" id="colorSwatches"></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Font:</span>
                            <div class="relative flex items-center">
                                <select id="fontSelect" onchange="changeFont(this.value)" class="appearance-none text-xs font-bold border border-[#E9E9E7] rounded-lg ps-3 pe-8 py-1.5 bg-white hover:bg-[#F9F9F8] outline-none text-[#37352F] cursor-pointer transition-all shadow-sm focus:ring-2 focus:ring-[#E9E9E7] focus:border-[#D3D3D1]">
                                    <option value="sans">Modern (Sans)</option>
                                    <option value="serif">Classic (Serif)</option>
                                    <option value="mono">Typewriter (Mono)</option>
                                </select>
                                <div class="absolute pointer-events-none flex items-center justify-center end-2">
                                    <i data-lucide="chevron-down" size="14" class="text-[#9B9A97]"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 space-y-6">
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">1.</span> <span>Clinical Images</span>
                                </label>
                            </div>
                            <div id="thumbContainer" class="hidden w-full bg-[#F7F7F5] border border-[#E9E9E7] rounded-md p-2 mb-2 flex gap-2 overflow-x-auto thumb-scroll"></div>
                            <div id="dropZone" class="relative group w-full h-28 rounded-md border border-dashed border-[#D3D3D1] bg-[#F7F7F5] flex flex-col items-center justify-center cursor-pointer hover:border-[#9B9A97] transition-all overflow-hidden">
                                <div class="flex flex-col items-center relative z-10">
                                    <i data-lucide="image-plus" class="text-[#9B9A97] w-5 h-5 mb-2 group-hover:text-[#37352F] transition-colors"></i>
                                    <span class="dz-text text-xs text-[#37352F] font-medium">Click to add images</span>
                                </div>
                                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">2.</span> <span>Questions Text</span>
                                </label>
                            </div>
                            <textarea id="qInput" class="w-full h-20 p-3 rounded-md border border-[#E9E9E7] bg-[#F7F7F5] outline-none text-sm font-semibold resize-none text-[#37352F] placeholder:text-slate-300" placeholder="A) What is the diagnosis?&#10;B) Describe the findings."></textarea>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="flex items-center gap-1.5 text-xs font-bold text-[#37352F]">
                                    <span class="text-[#9B9A97]">3.</span> <span>Answers (Colored Box)</span>
                                </label>
                            </div>
                            <textarea id="aInput" class="w-full h-20 p-3 rounded-md border outline-none text-sm text-[#37352F] font-bold resize-none" placeholder="A) Iron deficiency anemia&#10;B) Microcytic, hypochromic"></textarea>
                        </div>

                        <button id="nextBtn" class="w-full bg-[#2F3437] hover:bg-[#191919] text-white py-3 rounded-md font-medium text-sm flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm"></button>
                    </div>
                </div>
            </div>

            <!-- Preview -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-6rem)]">
                <div class="flex justify-between items-end mb-3 shrink-0 px-1">
                    <h3 class="text-sm font-bold text-[#37352F] mb-0.5">Workspace Preview</h3>
                </div>
                <div id="previewScrollArea" class="bg-[#EFEFED] p-4 sm:p-8 rounded-lg border border-[#E9E9E7] overflow-y-auto thumb-scroll flex-1 shadow-inner relative">
                    <div id="gridPreview" class="relative flex flex-col gap-10 items-center w-full max-w-3xl mx-auto pb-8 z-10"></div>
                </div>
            </div>
        </div>

        <footer class="mt-8 pt-5 border-t border-[#E9E9E7] text-center">
            <p class="text-sm text-[#9B9A97] font-medium">
                Added by Muhammad Saadoon | <a href="https://t.me/anemd" target="_blank" class="text-[#37352F] hover:text-[#0088cc] font-bold transition-colors">@anemd</a>
            </p>
        </footer>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        window.activeIdx = 0;
        window.dataStore = [];
        const dummyDoc = new jsPDF('p', 'mm', 'a4');

        const themes = {
            pink:   { bg: '#FBE4E4', border: '#F5E6E6', name: 'Soft Pink', rgb: [251, 228, 228] },
            blue:   { bg: '#E4F0FB', border: '#E6EEF5', name: 'Ice Blue', rgb: [228, 240, 251] },
            green:  { bg: '#E4FBEA', border: '#E6F5E9', name: 'Mint Green', rgb: [228, 251, 234] },
            yellow: { bg: '#FBF4E4', border: '#F5EFE6', name: 'Warm Yellow', rgb: [251, 244, 228] },
            purple: { bg: '#EBE4FB', border: '#EAE6F5', name: 'Lavender', rgb: [235, 228, 251] }
        };

        const fonts = {
            sans:  { css: "'Inter', sans-serif", jspdf: "helvetica" },
            serif: { css: "Georgia, serif", jspdf: "times" },
            mono:  { css: "'Courier New', Courier, monospace", jspdf: "courier" }
        };

        window.activeTheme = 'pink';
        window.activeFont = 'sans';

        const ui = {
            file: document.getElementById('fileInput'),
            thumbContainer: document.getElementById('thumbContainer'),
            dropZone: document.getElementById('dropZone'),
            q: document.getElementById('qInput'),
            a: document.getElementById('aInput'),
            grid: document.getElementById('gridPreview'),
            next: document.getElementById('nextBtn'),
            slotLabel: document.getElementById('slotLabel'),
            pageLabel: document.getElementById('pageLabel'),
            totalCount: document.getElementById('totalSlotsCount'),
            scrollArea: document.getElementById('previewScrollArea')
        };

        let saveTimeout;
        const triggerCloudSave = () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                if (window.saveStateToCloud) window.saveStateToCloud();
            }, 1000);
        };

        ui.q.oninput = () => { 
            window.dataStore[window.activeIdx].questions = ui.q.value; 
            triggerCloudSave();
        };
        ui.a.oninput = () => { 
            window.dataStore[window.activeIdx].answers = ui.a.value; 
            triggerCloudSave();
        };

        window.initStylingControls = function() {
            const swatches = document.getElementById('colorSwatches');
            swatches.innerHTML = Object.keys(themes).map(key => `
                <button onclick="changeTheme('${key}')" 
                    class="w-5 h-5 rounded-full transition-all focus:outline-none ${window.activeTheme === key ? 'ring-2 ring-[#37352F] ring-offset-1 scale-110' : 'hover:scale-110'}" 
                    style="background-color: ${themes[key].bg}; border: 1px solid ${themes[key].border};">
                </button>
            `).join('');
        };

        window.changeTheme = function(key) {
            window.activeTheme = key;
            window.initStylingControls();
            ui.a.style.backgroundColor = themes[window.activeTheme].bg;
            ui.a.style.borderColor = themes[window.activeTheme].border;
            refreshPreview(); 
            triggerCloudSave();
        };

        window.changeFont = function(key) {
            window.activeFont = key;
            ui.q.style.fontFamily = fonts[window.activeFont].css;
            ui.a.style.fontFamily = fonts[window.activeFont].css;
            refreshPreview();
            triggerCloudSave();
        };

        window.addNewPage = function(shouldRefresh = true) {
            const startId = window.dataStore.length;
            for(let i = 0; i < 6; i++) {
                window.dataStore.push({ id: startId + i, images: [], questions: "", answers: "", filled: false });
            }
            if (shouldRefresh) {
                window.activeIdx = startId; 
                window.refreshEditor();
                window.refreshPreview();
                scrollToActive();
                triggerCloudSave();
            }
        };

        window.removePage = function(pageIdx) {
            const totalPages = window.dataStore.length / 6;
            if (totalPages <= 1) return;
            if(confirm(`Delete Page ${pageIdx + 1}?`)) {
                window.dataStore.splice(pageIdx * 6, 6);
                if (window.activeIdx >= pageIdx * 6 && window.activeIdx < (pageIdx + 1) * 6) {
                    window.activeIdx = Math.max(0, (pageIdx - 1) * 6);
                } else if (window.activeIdx >= (pageIdx + 1) * 6) {
                    window.activeIdx -= 6;
                }
                window.refreshEditor();
                window.refreshPreview();
                
                // When we remove a page, we need to clear everything and resync
                if (window.clearCloudData && window.saveStateToCloud) {
                    window.clearCloudData().then(() => window.saveStateToCloud());
                }
            }
        };

        function scalePages() {
            const wrappers = document.querySelectorAll('.a4-wrapper');
            wrappers.forEach(wrapper => {
                const scale = wrapper.clientWidth / 794;
                const page = wrapper.querySelector('.a4-page');
                if (page) page.style.transform = `scale(${scale})`;
            });
            ui.scrollArea.style.opacity = '1';
        }
        
        window.addEventListener('resize', scalePages);

        window.refreshEditor = function() {
            const item = window.dataStore[window.activeIdx];
            if (!item) return;
            ui.pageLabel.textContent = Math.floor(window.activeIdx / 6) + 1;
            ui.slotLabel.textContent = (window.activeIdx % 6) + 1;
            ui.totalCount.textContent = `Total: ${window.dataStore.length} slots`;
            
            ui.q.style.fontFamily = fonts[window.activeFont].css;
            ui.a.style.fontFamily = fonts[window.activeFont].css;
            ui.a.style.backgroundColor = themes[window.activeTheme].bg;
            ui.a.style.borderColor = themes[window.activeTheme].border;

            ui.q.value = item.questions;
            ui.a.value = item.answers;
            
            if (item.images.length > 0) {
                ui.thumbContainer.classList.remove('hidden');
                ui.dropZone.classList.add('h-14'); ui.dropZone.classList.remove('h-28');
                ui.thumbContainer.innerHTML = item.images.map((img, i) => `
                    <div class="relative shrink-0 w-12 h-12 bg-white rounded border border-[#E9E9E7] p-1 group">
                        <img src="${img}" class="w-full h-full object-cover rounded-sm" />
                        <button onclick="window.removeImage(${i})" class="absolute -top-1.5 -right-1.5 bg-[#EB5757] text-white rounded-full p-0.5 hidden group-hover:block transition-colors">
                            <i data-lucide="x" size="12"></i>
                        </button>
                    </div>
                `).join('');
            } else {
                ui.thumbContainer.classList.add('hidden');
                ui.dropZone.classList.add('h-28'); ui.dropZone.classList.remove('h-14');
            }
            
            const btnIcon = window.activeIdx === window.dataStore.length - 1 ? 'file-plus' : 'arrow-right';
            const btnText = window.activeIdx === window.dataStore.length - 1 ? 'Save & Add Page' : 'Save & Edit Next Slot';
            ui.next.innerHTML = `<span>${btnText}</span> <i data-lucide="${btnIcon}" size="16"></i>`;
            lucide.createIcons();
        };

        window.refreshPreview = function() {
            const totalPages = window.dataStore.length / 6;
            let fullHtml = '';

            for (let p = 0; p < totalPages; p++) {
                let pageSlotsHtml = '';
                for (let i = 0; i < 6; i++) {
                    const globalIdx = (p * 6) + i;
                    const s = window.dataStore[globalIdx];
                    let borderStyle = 'border-color: #E9E9E7; border-style: solid; border-width: 0; border-right-width: ' + (i % 2 === 0 ? '2px; ' : '0; ');
                    if (i < 4) borderStyle += 'border-bottom-width: 2px; ';
                    
                    let activeClass = globalIdx === window.activeIdx ? 'active-cell bg-[#FAFAFA]' : 'hover:bg-[#F9F9F8] transition-colors';
                    let activeIdAttr = globalIdx === window.activeIdx ? 'id="active-slot-element"' : '';

                    let imgHtml = '';
                    if (s.images.length > 0) {
                        let cols = s.images.length === 1 ? 1 : 2;
                        imgHtml = `<div style="flex: 1; width: 100%; display: grid; grid-template-columns: repeat(${cols}, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; min-height: 0;">`;
                        s.images.forEach(img => {
                            imgHtml += `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="${img}" style="max-width: 100%; max-height: 100%; object-fit: contain;" /></div>`;
                        });
                        imgHtml += `</div>`;
                    } else {
                        imgHtml = `<div style="flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 0;"><div style="font-size: 11px; color: #D3D3D1; font-weight: bold; padding: 4px 10px; border-radius: 4px; border: 1px solid #E9E9E7; background: white; text-transform: uppercase;">P${p+1} - Slot ${i+1}</div></div>`;
                    }

                    pageSlotsHtml += `
                        <div ${activeIdAttr} onclick="window.goto(${globalIdx})" class="relative flex flex-col cursor-pointer overflow-hidden ${activeClass}" style="${borderStyle} padding: 28px; box-sizing: border-box;">
                            ${imgHtml}
                            <div style="margin-top: auto; display: flex; flex-direction: column; width: 100%; flex-shrink: 0;">
                                ${s.questions ? `<div style="font-family: ${fonts[window.activeFont].css}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 0 12px; margin-bottom: 8px; word-wrap: break-word;">${s.questions}</div>` : ''}
                                ${s.answers ? `<div style="font-family: ${fonts[window.activeFont].css}; background-color: ${themes[window.activeTheme].bg}; font-weight: bold; color: #37352F; font-size: 14px; line-height: 1.5; white-space: pre-wrap; padding: 12px; border-radius: 4px; word-wrap: break-word;">${s.answers}</div>` : ''}
                            </div>
                        </div>
                    `;
                }
                const delBtn = totalPages > 1 ? `<button onclick="window.removePage(${p})" class="ml-auto text-rose-400 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" size="14"></i></button>` : '';
                fullHtml += `<div class="w-full flex flex-col items-center group relative"><div class="w-full max-w-[794px] mb-2 flex items-center px-1"><span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-widest">Page ${p + 1}</span>${delBtn}</div><div class="a4-wrapper"><div class="a4-page" id="page-${p}">${pageSlotsHtml}</div></div></div>`;
            }

            ui.grid.innerHTML = fullHtml;
            requestAnimationFrame(scalePages);
            lucide.createIcons();
        };

        function scrollToActive() {
            setTimeout(() => {
                const el = document.getElementById('active-slot-element');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        ui.dropZone.onclick = () => ui.file.click();
        ui.file.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const r = new FileReader();
                r.onload = (ev) => { window.dataStore[window.activeIdx].images.push(ev.target.result); window.refreshPreview(); window.refreshEditor(); triggerCloudSave(); };
                r.readAsDataURL(file);
            });
            ui.file.value = ""; 
        };

        window.removeImage = (imgIdx) => { window.dataStore[window.activeIdx].images.splice(imgIdx, 1); window.refreshPreview(); window.refreshEditor(); triggerCloudSave(); };
        window.goto = (idx) => { window.activeIdx = idx; window.refreshEditor(); window.refreshPreview(); scrollToActive(); };

        ui.next.onclick = () => {
            window.dataStore[window.activeIdx].filled = true;
            if (window.activeIdx < window.dataStore.length - 1) { window.activeIdx++; window.refreshEditor(); window.refreshPreview(); scrollToActive(); }
            else { window.addNewPage(); }
            triggerCloudSave();
        };

        document.getElementById('clearBtn').onclick = () => {
            if(confirm("Erase all data?")) { 
                window.dataStore = []; 
                window.activeIdx = 0; 
                window.addNewPage(true); 
                if (window.clearCloudData) window.clearCloudData();
            }
        };

        async function buildPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true; const original = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> <span>Exporting...</span>`;

            const doc = new jsPDF('p', 'mm', 'a4');
            const cW = 210 / 2, cH = 297 / 3, pad = 8; 
            const activeRGB = themes[window.activeTheme].rgb, activeJsPdfFont = fonts[window.activeFont].jspdf;
            const totalPages = window.dataStore.length / 6;

            for (let p = 0; p < totalPages; p++) {
                if (p > 0) doc.addPage(); 
                doc.setDrawColor(233, 233, 231); doc.setLineWidth(0.3);
                doc.line(cW, 0, cW, 297); doc.line(0, cH, 210, cH); doc.line(0, cH * 2, 210, cH * 2);

                for (let i = 0; i < 6; i++) {
                    const s = window.dataStore[(p * 6) + i];
                    const x = (i % 2) * cW, y = Math.floor(i / 2) * cH;
                    let aBoxH = 0, aBoxY = y + cH - pad, aLines = [];

                    if (s.answers) {
                        doc.setFont(activeJsPdfFont, "bold");
                        aLines = doc.splitTextToSize(s.answers, cW - (pad * 2) - 6); 
                        aBoxH = (aLines.length * 5) + 6; aBoxY = y + cH - pad - aBoxH; 
                        doc.setFillColor(activeRGB[0], activeRGB[1], activeRGB[2]); doc.rect(x + pad, aBoxY, cW - (pad * 2), aBoxH, 'F');
                        doc.setFontSize(10); doc.setTextColor(55, 53, 47); doc.text(aLines, x + pad + 3, aBoxY + 5.5);
                    }

                    let qH = 0, qY = aBoxY, qLines = [];
                    if (s.questions) {
                        doc.setFont(activeJsPdfFont, "bold");
                        qLines = doc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                        qH = qLines.length * 4.5; qY = s.answers ? (aBoxY - 3 - qH) : (y + cH - pad - qH);
                        doc.setFontSize(10); doc.setTextColor(55, 53, 47); doc.text(qLines, x + pad + 3, qY + 3.5); 
                    }

                    if (s.images.length > 0) {
                        let maxAvailableHeight = qY - y - pad - 2, maxAvailableWidth = cW - (pad * 2);
                        let cols = s.images.length === 1 ? 1 : 2, rows = Math.ceil(s.images.length / cols), gap = 3; 
                        let cellW = (maxAvailableWidth - (cols - 1) * gap) / cols, cellH = (maxAvailableHeight - (rows - 1) * gap) / rows;

                        s.images.forEach((imgSrc, idx) => {
                            try {
                                const props = doc.getImageProperties(imgSrc);
                                const ratio = props.height / props.width;
                                let finalW = cellW, finalH = finalW * ratio;
                                if (finalH > cellH) { finalH = cellH; finalW = finalH / ratio; }
                                const cx = x + pad + (idx % cols) * (cellW + gap) + (cellW - finalW) / 2;
                                const cy = y + pad + Math.floor(idx / cols) * (cellH + gap) + (cellH - finalH) / 2;
                                doc.addImage(imgSrc, 'JPEG', cx, cy, finalW, finalH, undefined, 'FAST');
                            } catch(err) { console.error(err); }
                        });
                    }
                }
            }
            doc.save(`Summary_Sheet_${Date.now()}.pdf`);
            btn.disabled = false; btn.innerHTML = original; lucide.createIcons();
        }
        document.getElementById('downloadBtn').onclick = buildPDF;

        // Start initialization
        window.addEventListener('DOMContentLoaded', () => {
            // No need to manually call addNewPage here, 
            // the Firebase listener will call refresh once logged in
        });
    </script>
</body>
</html>
