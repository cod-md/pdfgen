```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequential Study Sheet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
        }

        .active-slot {
            border-color: #3b82f6;
            background-color: #eff6ff;
            ring: 2px;
            ring-color: #3b82f6;
        }

        .completed-slot {
            border-color: #10b981;
            background-color: #f0fdf4;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="layout-grid" class="text-blue-600"></i>
                    Study Sheet Builder
                </h1>
                <p class="text-slate-500">Fill slots sequentially to build your A4 sheet.</p>
            </div>
            <button id="downloadBtn" class="flex items-center gap-2 bg-slate-900 hover:bg-black text-white px-6 py-3 rounded-xl font-semibold transition-all active:scale-95 disabled:opacity-50">
                <i data-lucide="printer" size="18"></i>
                Generate PDF (A4)
            </button>
        </header>

        <!-- Current Editor Section -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden mb-10">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    Editing Slot <span id="currentSlotNum" class="bg-blue-600 text-white w-7 h-7 inline-flex items-center justify-center rounded-full text-sm">1</span>
                </h2>
                <div class="flex gap-1" id="slotPagination">
                    <!-- Dots for slots -->
                </div>
            </div>

            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Image Side -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Clinical Image</label>
                    <div id="dropZone" class="relative group w-full h-64 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/30 transition-all">
                        <div id="uploadPlaceholder" class="flex flex-col items-center">
                            <i data-lucide="cloud-upload" class="text-slate-300 mb-2 w-10 h-10"></i>
                            <span class="text-sm text-slate-400 font-medium">Click or Drag Image</span>
                        </div>
                        <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-contain p-4" />
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        <button id="removeImgBtn" class="hidden absolute top-2 right-2 bg-white/90 hover:bg-rose-50 text-rose-500 p-2 rounded-full shadow-sm">
                            <i data-lucide="x" size="16"></i>
                        </button>
                    </div>
                </div>

                <!-- Text Side -->
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Questions (Black Text)</label>
                        <textarea id="qInput" class="w-full h-24 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-100 outline-none resize-none text-sm leading-relaxed" placeholder="A) What is the sign?&#10;B) What is the diagnosis?"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-rose-400 uppercase mb-2">Answers (Pink Box Content)</label>
                        <textarea id="aInput" class="w-full h-24 p-4 rounded-xl border border-rose-100 bg-rose-50/30 focus:ring-2 focus:ring-rose-100 outline-none resize-none text-sm text-rose-900 font-medium" placeholder="A) Koilonychia&#10;B) Iron Deficiency Anemia"></textarea>
                    </div>
                    <button id="registerBtn" class="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-100 transition-all active:scale-95">
                        Register & Next Slot
                        <i data-lucide="chevron-right" size="18"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- The "Registered Below" Grid -->
        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Sheet Preview (2x3 Grid)</h3>
        <div id="gridPreview" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <!-- 6 slots will be rendered here -->
        </div>

    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let currentIndex = 0;
        let slots = Array.from({ length: 6 }, (_, i) => ({
            id: i,
            image: null,
            questions: "",
            answers: "",
            completed: false
        }));

        // Selectors
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const qInput = document.getElementById('qInput');
        const aInput = document.getElementById('aInput');
        const currentSlotNum = document.getElementById('currentSlotNum');
        const removeImgBtn = document.getElementById('removeImgBtn');
        const gridPreview = document.getElementById('gridPreview');
        const registerBtn = document.getElementById('registerBtn');

        // Init UI
        function init() {
            renderGrid();
            renderPagination();
            loadCurrentSlot();
            lucide.createIcons();
        }

        function loadCurrentSlot() {
            const data = slots[currentIndex];
            currentSlotNum.textContent = currentIndex + 1;
            qInput.value = data.questions;
            aInput.value = data.answers;
            
            if (data.image) {
                imagePreview.src = data.image;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
                removeImgBtn.classList.remove('hidden');
            } else {
                imagePreview.classList.add('hidden');
                uploadPlaceholder.classList.remove('hidden');
                removeImgBtn.classList.add('hidden');
            }
            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('slotPagination');
            container.innerHTML = slots.map((s, i) => `
                <div onclick="jumpToSlot(${i})" class="w-2.5 h-2.5 rounded-full cursor-pointer transition-all ${i === currentIndex ? 'bg-blue-600 w-6' : (s.completed ? 'bg-emerald-400' : 'bg-slate-200')}"></div>
            `).join('');
        }

        function renderGrid() {
            gridPreview.innerHTML = slots.map((slot, i) => `
                <div onclick="jumpToSlot(${i})" class="aspect-[3/4] rounded-xl border-2 transition-all cursor-pointer flex flex-col p-3 overflow-hidden ${i === currentIndex ? 'border-blue-500 bg-blue-50' : (slot.completed ? 'border-emerald-200 bg-white' : 'border-slate-200 bg-slate-50 opacity-60')}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-slate-400">#${i+1}</span>
                        ${slot.completed ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-3 h-3"></i>' : ''}
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        <div class="h-1/3 bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center">
                            ${slot.image ? `<img src="${slot.image}" class="h-full object-contain" />` : '<i data-lucide="image" class="w-4 h-4 text-slate-300"></i>'}
                        </div>
                        <div class="flex-1 space-y-1">
                            <div class="h-1 w-full bg-slate-200 rounded"></div>
                            <div class="h-1 w-2/3 bg-slate-200 rounded"></div>
                            <div class="h-3 w-full bg-rose-100 rounded mt-2"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Actions
        document.getElementById('dropZone').onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    slots[currentIndex].image = re.target.result;
                    loadCurrentSlot();
                    renderGrid();
                };
                reader.readAsDataURL(file);
            }
        };

        removeImgBtn.onclick = (e) => {
            e.stopPropagation();
            slots[currentIndex].image = null;
            loadCurrentSlot();
            renderGrid();
        };

        window.jumpToSlot = (index) => {
            currentIndex = index;
            loadCurrentSlot();
            renderGrid();
        };

        registerBtn.onclick = () => {
            // Save data
            slots[currentIndex].questions = qInput.value;
            slots[currentIndex].answers = aInput.value;
            slots[currentIndex].completed = true;

            // Move to next
            if (currentIndex < 5) {
                currentIndex++;
            } else {
                alert("All 6 slots filled! You can now print the PDF.");
            }
            loadCurrentSlot();
            renderGrid();
        };

        // PDF Logic
        async function generatePDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div> Generating...`;

            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;
            const colW = pageWidth / 2;
            const rowH = pageHeight / 3;
            const pad = 10;

            // Draw Grid Lines
            doc.setDrawColor(180);
            doc.line(colW, 0, colW, pageHeight);
            doc.line(0, rowH, pageWidth, rowH);
            doc.line(0, rowH * 2, pageWidth, rowH * 2);

            for (let i = 0; i < 6; i++) {
                const s = slots[i];
                const col = i % 2;
                const row = Math.floor(i / 2);
                const x = col * colW;
                const y = row * rowH;

                // Image
                if (s.image) {
                    try {
                        doc.addImage(s.image, 'JPEG', x + pad, y + pad, colW - (pad * 2), rowH * 0.4, undefined, 'FAST');
                    } catch(e) {}
                }

                // Questions
                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(0,0,0);
                const qText = doc.splitTextToSize(s.questions || "", colW - (pad * 2));
                doc.text(qText, x + pad, y + (rowH * 0.5));

                // Answers Pink Box
                if (s.answers) {
                    const aText = doc.splitTextToSize(s.answers, colW - (pad * 3));
                    const boxH = (aText.length * 5) + 6;
                    const boxY = y + rowH - boxH - pad;

                    doc.setFillColor(255, 220, 220); // Pink
                    doc.rect(x + pad, boxY, colW - (pad * 2), boxH, 'F');
                    
                    doc.setFont("helvetica", "bold");
                    doc.text(aText, x + pad + 3, boxY + 5);
                }
            }

            doc.save(`Study_Sheet_${Date.now()}.pdf`);
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="printer" size="18"></i> Generate PDF (A4)`;
            lucide.createIcons();
        }

        document.getElementById('downloadBtn').onclick = generatePDF;

        window.onload = init;
    </script>
</body>
</html>

```
