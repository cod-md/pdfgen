
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Summary Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F7F7F5; 
            color: #37352F;
            min-height: 100vh;
        }

        #previewScrollArea {
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E9E9E7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D3D3D1; }
        
        .a4-wrapper {
            aspect-ratio: 1 / 1.4142;
            width: 100%;
            background-color: white;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .a4-page {
            width: 794px; 
            height: 1123px; 
            background-color: white;
            display: grid;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
        }
        
        .a4-page.auto-fit-mode {
            display: block; 
        }

        .active-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #37352F;
            background-color: rgba(55, 53, 47, 0.02);
            pointer-events: none;
            z-index: 10;
        }

        textarea { transition: border-color 0.1s ease; }
        textarea:focus { border-color: #9B9A97 !important; box-shadow: none !important; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-[1300px] mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6 bg-white p-4 md:px-6 rounded-lg border border-[#E9E9E7] shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded bg-[#F7F7F5] border border-[#E9E9E7] flex items-center justify-center shrink-0">
                    <i data-lucide="layout-template" class="text-[#37352F] w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-[#37352F]">Medical Summary Builder</h1>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <button id="clearBtn" class="px-3 py-1.5 text-[#9B9A97] hover:text-[#EB5757] hover:bg-[#FFF3F3] rounded text-sm font-medium transition-all">Clear All</button>
                <div class="w-px h-5 bg-[#E9E9E7] mx-1 hidden md:block"></div>
                <button onclick="addNewPage()" class="flex items-center gap-1.5 bg-white hover:bg-[#F7F7F5] text-[#37352F] px-4 py-2 rounded text-sm font-medium transition-all border border-[#E9E9E7] shadow-sm">
                    <i data-lucide="file-plus" size="16"></i>
                    <span>Add Page</span>
                </button>
                <button id="downloadBtn" class="flex items-center gap-1.5 bg-[#2F3437] hover:bg-[#191919] text-white px-5 py-2 rounded text-sm font-medium shadow-sm transition-all active:scale-95">
                    <i data-lucide="printer" size="16"></i>
                    <span>Export PDF</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white rounded-lg shadow-sm border border-[#E9E9E7] overflow-hidden sticky top-8 flex flex-col">
                    <div class="bg-[#F7F7F5] px-5 py-3 border-b border-[#E9E9E7] flex justify-between items-center">
                        <span class="font-bold text-sm text-[#37352F]">
                            Editing: Page <span id="pageLabel">1</span>, Slot <span id="slotLabel" class="bg-white px-2 py-0.5 rounded border border-[#E9E9E7]">1</span>
                        </span>
                        <span class="text-xs text-[#9B9A97] font-medium" id="totalSlotsCount"></span>
                    </div>

                    <div class="bg-white px-5 py-3 border-b border-[#E9E9E7] flex flex-col gap-y-4">
                        
                        <!-- Row 1: Aesthetics -->
                        <div class="flex flex-wrap items-center gap-x-8 gap-y-4">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Theme:</span>
                                <div class="flex gap-1.5" id="colorSwatches"></div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Font:</span>
                                <select id="fontSelect" onchange="changeFont(this.value)" class="text-xs font-bold border border-[#E9E9E7] rounded px-2 py-1 bg-white outline-none cursor-pointer">
                                    <option value="sans">Modern</option>
                                    <option value="serif">Classic</option>
                                    <option value="mono">Typewriter</option>
                                </select>
                            </div>
                        </div>

                        <!-- Row 2: Manual Content Sizing -->
                        <div class="flex flex-wrap items-center gap-x-8 gap-y-4">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Text Size:</span>
                                <select id="textSizeSelect" onchange="changeTextSize(this.value)" class="text-xs font-bold border border-[#E9E9E7] rounded px-2 py-1 bg-white outline-none cursor-pointer">
                                    <option value="8">Small</option>
                                    <option value="10" selected>Normal</option>
                                    <option value="12">Large</option>
                                    <option value="14">Huge</option>
                                </select>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Image Size:</span>
                                <select id="imgSizeSelect" onchange="changeImgSize(this.value)" class="text-xs font-bold border border-[#E9E9E7] rounded px-2 py-1 bg-white outline-none cursor-pointer">
                                    <option value="50">Small</option>
                                    <option value="75" selected>Normal</option>
                                    <option value="100">Large</option>
                                </select>
                            </div>
                        </div>

                        <!-- Row 3: Layout & Auto Fit -->
                        <div class="flex flex-wrap items-center gap-4 pt-2 border-t border-[#F7F7F5]">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-wider">Grid:</span>
                                <select id="gridSelect" onchange="changeGrid(this.value)" class="text-xs font-bold border border-[#E9E9E7] rounded px-2 py-1 bg-white outline-none cursor-pointer">
                                    <option value="1">1 Slot</option>
                                    <option value="2">2 Slots</option>
                                    <option value="3">3 Slots</option>
                                    <option value="4">4 Slots</option>
                                    <option value="6" selected>6 Slots</option>
                                    <option value="8">8 Slots</option>
                                    <option value="9">9 Slots</option>
                                </select>
                            </div>
                            
                            <button id="autoFitBtn" onclick="toggleAutoFit()" class="flex items-center gap-1.5 text-xs font-bold border border-[#E9E9E7] rounded px-3 py-1 bg-white text-[#37352F] hover:bg-[#F9F9F8] transition-colors shadow-sm">
                                <i data-lucide="maximize" size="14"></i>
                                Auto-Fit Content
                            </button>
                        </div>
                    </div>

                    <div class="p-6 space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-[#9B9A97] mb-2 uppercase tracking-widest">1. Images</label>
                            <div id="thumbContainer" class="hidden w-full bg-[#F7F7F5] border border-[#E9E9E7] rounded-md p-2 mb-2 flex gap-2 overflow-x-auto thumb-scroll"></div>
                            <div id="dropZone" onclick="document.getElementById('fileInput').click()" class="relative group w-full h-24 rounded-md border border-dashed border-[#D3D3D1] bg-[#F7F7F5] flex flex-col items-center justify-center cursor-pointer hover:border-[#9B9A97] transition-all">
                                <i data-lucide="image-plus" class="text-[#9B9A97] w-5 h-5 mb-1"></i>
                                <span class="text-xs text-[#37352F] font-medium">Add images</span>
                                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple onchange="handleFileUpload(event)">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-[#9B9A97] mb-2 uppercase tracking-widest">2. Questions</label>
                            <textarea id="qInput" oninput="saveText()" class="w-full h-20 p-3 rounded-md border border-[#E9E9E7] bg-[#F7F7F5] outline-none text-sm font-semibold resize-none text-[#37352F]" placeholder="A) Diagnosis?"></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-[#9B9A97] mb-2 uppercase tracking-widest">3. Answers</label>
                            <textarea id="aInput" oninput="saveText()" class="w-full h-20 p-3 rounded-md border outline-none text-sm text-[#37352F] font-bold resize-none" placeholder="A) Result here..."></textarea>
                        </div>

                        <button id="nextBtn" onclick="nextSlot()" class="w-full bg-[#2F3437] hover:bg-[#191919] text-white py-3 rounded-md font-medium text-sm flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm"></button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-6rem)]">
                <div class="flex justify-between items-end mb-3 shrink-0 px-1">
                    <h3 class="text-sm font-bold text-[#37352F] mb-0.5 uppercase tracking-widest text-[#9B9A97]">Workspace Preview</h3>
                </div>
                <div id="previewScrollArea" class="bg-[#EFEFED] p-4 sm:p-8 rounded-lg border border-[#E9E9E7] overflow-y-auto thumb-scroll flex-1 shadow-inner relative">
                    <div id="gridPreview" class="relative flex flex-col gap-10 items-center w-full max-w-3xl mx-auto pb-8 z-10"></div>
                </div>
            </div>
        </div>

        <footer class="mt-8 pt-5 border-t border-[#E9E9E7] text-center">
            <p class="text-sm text-[#9B9A97] font-medium">
                Added by Muhammad Saadoon | <a href="https://t.me/anemd" target="_blank" class="text-[#37352F] hover:text-[#0088cc] font-bold transition-colors">@anemd</a>
            </p>
        </footer>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let activeIdx = 0;
        let dataStore = [];
        let slotsPerPage = 6; 
        
        let activeTheme = 'pink';
        let activeFont = 'sans';
        let activeFontSize = 10;
        let activeImgSize = 75; // Represents scale width percentage (50, 75, 100)
        let isAutoFit = false;

        const themes = {
            pink:   { bg: '#FBE4E4', border: '#F5E6E6', rgb: [251, 228, 228] },
            blue:   { bg: '#E4F0FB', border: '#E6EEF5', rgb: [228, 240, 251] },
            green:  { bg: '#E4FBEA', border: '#E6F5E9', rgb: [228, 251, 234] },
            yellow: { bg: '#FBF4E4', border: '#F5EFE6', rgb: [251, 244, 228] },
            purple: { bg: '#EBE4FB', border: '#EAE6F5', rgb: [235, 228, 251] }
        };

        const fonts = {
            sans:  { css: "'Inter', sans-serif", jspdf: "helvetica" },
            serif: { css: "Georgia, serif", jspdf: "times" },
            mono:  { css: "'Courier New', Courier, monospace", jspdf: "courier" }
        };

        const ui = {
            q: document.getElementById('qInput'),
            a: document.getElementById('aInput'),
            grid: document.getElementById('gridPreview'),
            next: document.getElementById('nextBtn'),
            scrollArea: document.getElementById('previewScrollArea')
        };

        const dummyDoc = new jsPDF('p', 'mm', 'a4');

        function toggleAutoFit() {
            isAutoFit = !isAutoFit;
            const btn = document.getElementById('autoFitBtn');
            if (isAutoFit) {
                btn.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-200');
                btn.classList.remove('bg-white', 'text-[#37352F]');
            } else {
                btn.classList.remove('bg-blue-50', 'text-blue-700', 'border-blue-200');
                btn.classList.add('bg-white', 'text-[#37352F]');
            }
            refreshAll();
        }

        function getGridLayout(slots) {
            let cols = 1, rows = 1;
            if (slots === 4) { cols = 2; rows = 2; }
            else if (slots === 6) { cols = 2; rows = 3; }
            else if (slots === 8) { cols = 2; rows = 4; }
            else if (slots === 9) { cols = 3; rows = 3; }
            else if (slots > 1) { cols = 1; rows = slots; }
            return { cols, rows };
        }

        // --- NEW INDEPENDENT COLUMNS ALGORITHM (MASONRY) ---
        function calculateIndependentLayout() {
            const pages = [];
            let currentPageSlots = [];
            const pW = 210, pH = 297, pad = 8;
            
            const { cols } = getGridLayout(slotsPerPage);
            const cW = pW / cols;
            let colY = new Array(cols).fill(0);

            dummyDoc.setFont(fonts[activeFont].jspdf, "bold");
            dummyDoc.setFontSize(activeFontSize);

            let rowWillOverflow = false;
            let tempRowSlots = [];

            for (let i = 0; i < dataStore.length; i++) {
                const s = dataStore[i];
                const colIdx = i % cols;
                
                let reqH = pad * 2; 
                let hasContent = false;

                // 1. Calculate height of images dynamically based on Scale
                if (s.images.length > 0) {
                    let imgCols = s.images.length === 1 ? 1 : 2;
                    let scaleW = activeImgSize / 100;
                    let availW = (cW - (pad * 2)) * scaleW;
                    let gap = 3;
                    let iW = (availW - (imgCols - 1) * gap) / imgCols;
                    let maxImgH = 0;
                    let limitH = 150 * scaleW; // Proportionally scale max height boundary

                    s.images.forEach(src => {
                        try {
                            const props = dummyDoc.getImageProperties(src);
                            const ratio = props.height / props.width;
                            let fH = iW * ratio;
                            if (fH > limitH) fH = limitH;
                            if (fH > maxImgH) maxImgH = fH;
                        } catch(e) {}
                    });
                    
                    let rows = Math.ceil(s.images.length / imgCols);
                    reqH += (maxImgH * rows) + (rows - 1)*gap;
                    hasContent = true;
                }

                // 2. Exact 1 Line Gap between Image and Text
                if (hasContent && (s.questions || s.answers)) {
                    reqH += activeFontSize * 0.35; 
                }

                // 3. Questions
                if (s.questions) {
                    let qLines = dummyDoc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                    reqH += (qLines.length * activeFontSize * 0.45); 
                    hasContent = true;
                }

                // Small gap between Q and A
                if (s.questions && s.answers) reqH += activeFontSize * 0.2;

                // 4. Answers
                if (s.answers) {
                    let aLines = dummyDoc.splitTextToSize(s.answers, cW - (pad * 2) - 6);
                    reqH += (aLines.length * activeFontSize * 0.5) + (activeFontSize * 0.6); 
                    hasContent = true;
                }

                if (!hasContent) reqH += 40; 
                if (reqH > pH - 16) reqH = pH - 16; 

                tempRowSlots.push({ data: s, reqH: reqH, colIdx: colIdx, originalIdx: i });

                if (colY[colIdx] + reqH > pH) rowWillOverflow = true;

                if (colIdx === cols - 1 || i === dataStore.length - 1) {
                    if (rowWillOverflow && currentPageSlots.length > 0) {
                        pages.push(currentPageSlots);
                        currentPageSlots = [];
                        colY = new Array(cols).fill(0);
                    }
                    
                    tempRowSlots.forEach(slot => {
                        slot.y = colY[slot.colIdx];
                        slot.x = slot.colIdx * cW;
                        slot.w = cW;
                        colY[slot.colIdx] += slot.reqH;
                        currentPageSlots.push(slot);
                    });

                    tempRowSlots = [];
                    rowWillOverflow = false;
                }
            }
            if (currentPageSlots.length > 0) pages.push(currentPageSlots);
            return pages;
        }

        function saveText() {
            dataStore[activeIdx].questions = ui.q.value;
            dataStore[activeIdx].answers = ui.a.value;
            refreshAll(); 
        }

        function changeTheme(key) { activeTheme = key; initStylingControls(); refreshAll(); }
        function changeFont(key) { activeFont = key; refreshAll(); }
        function changeTextSize(val) { activeFontSize = parseInt(val); refreshAll(); }
        function changeImgSize(val) { activeImgSize = parseInt(val); refreshAll(); }

        function changeGrid(val) {
            slotsPerPage = parseInt(val);
            const totalItems = dataStore.length;
            const remainder = totalItems % slotsPerPage;
            if (remainder !== 0) {
                const needed = slotsPerPage - remainder;
                for (let i = 0; i < needed; i++) {
                    dataStore.push({ id: dataStore.length, images: [], questions: "", answers: "" });
                }
            }
            if (activeIdx >= dataStore.length) activeIdx = 0;
            refreshAll();
        }

        function addNewPage(shouldRefresh = true) {
            const { cols } = getGridLayout(slotsPerPage);
            let addCount = isAutoFit ? cols : slotsPerPage;
            for(let i = 0; i < addCount; i++) {
                dataStore.push({ id: dataStore.length, images: [], questions: "", answers: "" });
            }
            if (shouldRefresh) {
                activeIdx = dataStore.length - addCount; 
                refreshAll();
                scrollToActive();
            }
        }

        function removePage(pIdx) {
            if (isAutoFit) { alert("Switch off Auto-Fit to easily delete specific pages."); return; }
            if (dataStore.length <= slotsPerPage) return;
            if (confirm("Delete this page and all its content?")) {
                dataStore.splice(pIdx * slotsPerPage, slotsPerPage);
                activeIdx = 0;
                refreshAll();
            }
        }

        function nextSlot() {
            if (activeIdx < dataStore.length - 1) {
                activeIdx++; refreshAll(); scrollToActive();
            } else { addNewPage(); }
        }

        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const r = new FileReader();
                r.onload = (ev) => {
                    dataStore[activeIdx].images.push(ev.target.result);
                    refreshAll();
                };
                r.readAsDataURL(file);
            });
            e.target.value = "";
        }

        function removeImage(imgIdx) { dataStore[activeIdx].images.splice(imgIdx, 1); refreshAll(); }

        function initStylingControls() {
            const swatches = document.getElementById('colorSwatches');
            swatches.innerHTML = Object.keys(themes).map(key => `
                <button onclick="changeTheme('${key}')" 
                    class="w-5 h-5 rounded-full transition-all focus:outline-none ${activeTheme === key ? 'ring-2 ring-[#37352F] ring-offset-1 scale-110' : 'hover:scale-110'}" 
                    style="background-color: ${themes[key].bg}; border: 1px solid ${themes[key].border};">
                </button>
            `).join('');
        }

        function scalePages() {
            const wrappers = document.querySelectorAll('.a4-wrapper');
            wrappers.forEach(wrapper => {
                const scale = wrapper.clientWidth / 794;
                const page = wrapper.querySelector('.a4-page');
                if (page) page.style.transform = `scale(${scale})`;
            });
            ui.scrollArea.style.opacity = '1';
        }

        function escapeHtml(t) { return !t ? '' : t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function refreshAll() {
            const item = dataStore[activeIdx];
            document.getElementById('pageLabel').textContent = Math.floor(activeIdx / slotsPerPage) + 1;
            document.getElementById('slotLabel').textContent = activeIdx + 1;
            document.getElementById('totalSlotsCount').textContent = `Total: ${dataStore.length} slots`;
            
            ui.q.style.fontFamily = fonts[activeFont].css;
            ui.a.style.fontFamily = fonts[activeFont].css;
            ui.a.style.backgroundColor = themes[activeTheme].bg;
            ui.a.style.borderColor = themes[activeTheme].border;

            if (ui.q.value !== item.questions) ui.q.value = item.questions;
            if (ui.a.value !== item.answers) ui.a.value = item.answers;

            const thumbContainer = document.getElementById('thumbContainer');
            if (item.images.length > 0) {
                thumbContainer.classList.remove('hidden');
                thumbContainer.innerHTML = item.images.map((img, i) => `
                    <div class="relative shrink-0 w-12 h-12 bg-white rounded border border-[#E9E9E7] p-1 group">
                        <img src="${img}" class="w-full h-full object-cover rounded-sm" />
                        <button onclick="removeImage(${i})" class="absolute -top-1.5 -right-1.5 bg-[#EB5757] text-white rounded-full p-0.5 group-hover:block hidden transition-colors">
                            <i data-lucide="x" size="10"></i>
                        </button>
                    </div>
                `).join('');
            } else {
                thumbContainer.classList.add('hidden');
            }

            let fullHtml = '';
            const { cols, rows } = getGridLayout(slotsPerPage);
            
            if (isAutoFit) {
                // --- RENDER MASONRY AUTO-FIT HTML ---
                const pages = calculateIndependentLayout();
                
                pages.forEach((pageSlots, p) => {
                    let pageSlotsHtml = '';
                    
                    pageSlots.forEach(slot => {
                        const s = slot.data;
                        const globalIdx = slot.originalIdx;
                        let activeClass = globalIdx === activeIdx ? 'active-cell bg-[#FAFAFA]' : 'hover:bg-[#F9F9F8] transition-colors';
                        let activeIdAttr = globalIdx === activeIdx ? 'id="active-slot-element"' : '';
                        
                        let t = (slot.y / 297) * 100;
                        let l = (slot.x / 210) * 100;
                        let w = (slot.w / 210) * 100;
                        let h = (slot.reqH / 297) * 100;
                        
                        let borderStyle = 'border-bottom: 2px solid #E9E9E7; ';
                        if (slot.colIdx < cols - 1) borderStyle += 'border-right: 2px solid #E9E9E7; ';
                        
                        let imgHtml = '';
                        if (s.images.length > 0) {
                            let iCols = s.images.length === 1 ? 1 : 2;
                            let gapMargin = activeFontSize * 1.4; 
                            let limitPx = 300 * (activeImgSize / 100);
                            imgHtml = `<div style="width: ${activeImgSize}%; margin: 0 auto ${gapMargin}px auto; display: grid; grid-template-columns: repeat(${iCols}, minmax(0, 1fr)); gap: 10px;">`;
                            s.images.forEach(img => imgHtml += `<div style="width: 100%; display: flex; justify-content: center;"><img src="${img}" style="max-width: 100%; max-height: ${limitPx}px; object-fit: contain;" /></div>`);
                            imgHtml += `</div>`;
                        } else {
                            imgHtml = `<div style="width: 100%; display: flex; justify-content: center; margin-bottom: 12px;"><span style="color: #D3D3D1; font-size: 10px; font-weight: bold; text-transform: uppercase;">Slot ${globalIdx+1}</span></div>`;
                        }
                        
                        const fsPx = activeFontSize * 1.4;
                        
                        pageSlotsHtml += `
                            <div ${activeIdAttr} onclick="activeIdx=${globalIdx}; refreshAll();" class="absolute flex flex-col cursor-pointer overflow-hidden ${activeClass}" style="left: ${l}%; top: ${t}%; width: ${w}%; height: ${h}%; padding: 24px; box-sizing: border-box; ${borderStyle}">
                                ${imgHtml}
                                <div style="display: flex; flex-direction: column; width: 100%;">
                                    ${s.questions ? `<div style="font-family: ${fonts[activeFont].css}; font-weight: bold; color: #37352F; font-size: ${fsPx}px; line-height: 1.4; white-space: pre-wrap; padding: 0 4px; margin-bottom: 8px; word-break: break-word;">${escapeHtml(s.questions)}</div>` : ''}
                                    ${s.answers ? `<div style="font-family: ${fonts[activeFont].css}; background-color: ${themes[activeTheme].bg}; font-weight: bold; color: #37352F; font-size: ${fsPx}px; line-height: 1.4; white-space: pre-wrap; padding: 10px; border-radius: 4px; word-break: break-word;">${escapeHtml(s.answers)}</div>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    fullHtml += `
                        <div class="w-full flex flex-col items-center">
                            <div class="w-full max-w-[794px] mb-2 flex justify-between items-center px-1">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-widest">Page ${p + 1}</span>
                            </div>
                            <div class="a4-wrapper"><div class="a4-page auto-fit-mode" id="page-${p}">${pageSlotsHtml}</div></div>
                        </div>`;
                });
                
            } else {
                // --- RENDER STRICT GRID HTML ---
                const totalPages = Math.ceil(dataStore.length / slotsPerPage);

                for (let p = 0; p < totalPages; p++) {
                    let pageSlotsHtml = '';
                    let gridStyle = `display: grid; grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr);`;

                    for (let i = 0; i < slotsPerPage; i++) {
                        const globalIdx = (p * slotsPerPage) + i;
                        if (globalIdx >= dataStore.length) continue;
                        const s = dataStore[globalIdx];
                        
                        let border = 'border-color: #E9E9E7; border-style: solid; border-width: 0;';
                        if (cols > 1 && (i % cols < cols - 1)) border += ' border-right-width: 2px;';
                        if (rows > 1 && i < (slotsPerPage - cols)) border += ' border-bottom-width: 2px;';

                        let activeClass = globalIdx === activeIdx ? 'active-cell bg-[#FAFAFA]' : 'hover:bg-[#F9F9F8] transition-colors';
                        let activeIdAttr = globalIdx === activeIdx ? 'id="active-slot-element"' : '';

                        let imgHtml = '';
                        if (s.images.length > 0) {
                            let iCols = s.images.length === 1 ? 1 : 2;
                            let maxH = activeImgSize * 0.45; // 50 -> 22.5%, 75 -> 33.7%, 100 -> 45%
                            imgHtml = `<div style="flex: 1; max-height: ${maxH}%; width: ${activeImgSize}%; margin: 0 auto 12px auto; display: grid; grid-template-columns: repeat(${iCols}, minmax(0, 1fr)); gap: 10px; min-height: 0;">`;
                            s.images.forEach(img => imgHtml += `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="${img}" style="max-width: 100%; max-height: 100%; object-fit: contain;" /></div>`);
                            imgHtml += `</div>`;
                        } else {
                            imgHtml = `<div style="flex: 1; display: flex; align-items: center; justify-content: center;"><span style="color: #D3D3D1; font-size: 10px; font-weight: bold; text-transform: uppercase;">Slot ${globalIdx+1}</span></div>`;
                        }

                        const fsPx = activeFontSize * 1.4;

                        pageSlotsHtml += `
                            <div ${activeIdAttr} onclick="activeIdx=${globalIdx}; refreshAll();" class="relative flex flex-col cursor-pointer overflow-hidden ${activeClass}" style="width: 100%; ${border} padding: 24px; box-sizing: border-box;">
                                ${imgHtml}
                                <div style="margin-top: auto; display: flex; flex-direction: column; width: 100%;">
                                    ${s.questions ? `<div style="font-family: ${fonts[activeFont].css}; font-weight: bold; color: #37352F; font-size: ${fsPx}px; line-height: 1.4; white-space: pre-wrap; padding: 0 4px; margin-bottom: 8px; word-break: break-word;">${escapeHtml(s.questions)}</div>` : ''}
                                    ${s.answers ? `<div style="font-family: ${fonts[activeFont].css}; background-color: ${themes[activeTheme].bg}; font-weight: bold; color: #37352F; font-size: ${fsPx}px; line-height: 1.4; white-space: pre-wrap; padding: 10px; border-radius: 4px; word-break: break-word;">${escapeHtml(s.answers)}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }

                    fullHtml += `
                        <div class="w-full flex flex-col items-center">
                            <div class="w-full max-w-[794px] mb-2 flex justify-between items-center px-1">
                                <span class="text-[10px] font-bold text-[#9B9A97] uppercase tracking-widest">Page ${p + 1}</span>
                                ${totalPages > 1 ? `<button onclick="removePage(${p})" class="text-rose-400 hover:text-rose-600 transition-colors" title="Delete Page"><i data-lucide="trash-2" size="14"></i></button>` : ''}
                            </div>
                            <div class="a4-wrapper"><div class="a4-page" id="page-${p}" style="${gridStyle}">${pageSlotsHtml}</div></div>
                        </div>
                    `;
                }
            }

            ui.grid.innerHTML = fullHtml;
            requestAnimationFrame(scalePages);
            
            const isLast = activeIdx === dataStore.length - 1;
            ui.next.innerHTML = `<span>${isLast ? 'Save & Add Slot' : 'Save & Next Slot'}</span> <i data-lucide="${isLast ? 'file-plus' : 'arrow-right'}" size="16"></i>`;
            lucide.createIcons();
        }

        function scrollToActive() {
            setTimeout(() => {
                const el = document.getElementById('active-slot-element');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        async function buildPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true; const original = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> <span>Exporting...</span>`;

            try {
                const doc = new jsPDF('p', 'mm', 'a4');
                const pW = 210, pH = 297, pad = 8;
                
                const { cols, rows } = getGridLayout(slotsPerPage);
                const rgb = themes[activeTheme].rgb, fName = fonts[activeFont].jspdf;

                if (isAutoFit) {
                    // PDF RENDER: MASONRY AUTO FIT
                    const pages = calculateIndependentLayout();
                    const cW = pW / cols;
                    
                    pages.forEach((pageSlots, pIdx) => {
                        if (pIdx > 0) doc.addPage();
                        
                        doc.setDrawColor(233, 233, 231); doc.setLineWidth(0.3);
                        for(let c=1; c<cols; c++) doc.line(c*cW, 0, c*cW, pH); 
                        
                        pageSlots.forEach(slot => {
                            const s = slot.data;
                            if (!s) return;
                            
                            doc.line(slot.x, slot.y + slot.reqH, slot.x + slot.w, slot.y + slot.reqH);

                            let currentY = slot.y + pad;
                            
                            if (s.images.length > 0) {
                                let imgCols = s.images.length === 1 ? 1 : 2;
                                let imgRows = Math.ceil(s.images.length / imgCols);
                                let gap = 3;
                                
                                let scaleW = activeImgSize / 100;
                                let availW = (cW - (pad * 2)) * scaleW;
                                let xOffset = (cW - (pad * 2) - availW) / 2;
                                let iW = (availW - (imgCols - 1)*gap) / imgCols;
                                
                                let limitH = 150 * scaleW;
                                let maxImgH = 0;
                                s.images.forEach(src => {
                                    try {
                                        const props = doc.getImageProperties(src);
                                        const ratio = props.height / props.width;
                                        let fH = iW * ratio;
                                        if (fH > limitH) fH = limitH;
                                        if (fH > maxImgH) maxImgH = fH;
                                    } catch(e) {}
                                });
                                
                                s.images.forEach((src, idx) => {
                                    try {
                                        const props = doc.getImageProperties(src);
                                        const ratio = props.height / props.width;
                                        let fW = iW, fH = fW * ratio;
                                        if (fH > maxImgH) { fH = maxImgH; fW = fH / ratio; }
                                        const cx = slot.x + pad + xOffset + (idx % imgCols) * (iW + gap) + (iW - fW) / 2;
                                        const cy = currentY + Math.floor(idx / imgCols) * (maxImgH + gap) + (maxImgH - fH) / 2;
                                        doc.addImage(src, 'JPEG', cx, cy, fW, fH, undefined, 'FAST');
                                    } catch(e) {}
                                });
                                currentY += (maxImgH * imgRows) + (imgRows - 1)*gap;
                            }

                            if (s.images.length > 0 && (s.questions || s.answers)) {
                                currentY += activeFontSize * 0.35; 
                            }

                            doc.setFont(fName, "bold");
                            doc.setFontSize(activeFontSize);

                            if (s.questions) {
                                let qLines = doc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                                doc.setTextColor(55, 53, 47);
                                doc.text(qLines, slot.x + pad + 3, currentY + (activeFontSize * 0.35));
                                currentY += (qLines.length * activeFontSize * 0.45);
                            }

                            if (s.questions && s.answers) {
                                currentY += activeFontSize * 0.2;
                            }

                            if (s.answers) {
                                let aLines = doc.splitTextToSize(s.answers, cW - (pad * 2) - 6);
                                let aBoxH = (aLines.length * activeFontSize * 0.5) + (activeFontSize * 0.6);
                                doc.setFillColor(rgb[0], rgb[1], rgb[2]);
                                doc.rect(slot.x + pad, currentY, cW - (pad * 2), aBoxH, 'F');
                                doc.setTextColor(55, 53, 47);
                                doc.text(aLines, slot.x + pad + 3, currentY + (activeFontSize * 0.55));
                            }
                        });
                    });
                } else {
                    // PDF RENDER: STRICT GRID
                    const cW = pW / cols, cH = pH / rows;
                    const totalPages = Math.ceil(dataStore.length / slotsPerPage);

                    for (let p = 0; p < totalPages; p++) {
                        if (p > 0) doc.addPage();
                        
                        doc.setDrawColor(233, 233, 231); doc.setLineWidth(0.3);
                        for(let c=1; c<cols; c++) doc.line(c*cW, 0, c*cW, pH);
                        for(let r=1; r<rows; r++) doc.line(0, r*cH, pW, r*cH);

                        for (let i = 0; i < slotsPerPage; i++) {
                            const globalIdx = (p * slotsPerPage) + i;
                            if (globalIdx >= dataStore.length) continue;
                            const s = dataStore[globalIdx];
                            const x = (i % cols) * cW, y = Math.floor(i / cols) * cH;
                            
                            if (!s) continue;
                            let aBoxH = 0, aBoxY = y + cH - pad, aLines = [];
                            if (s.answers) {
                                doc.setFont(fName, "bold");
                                doc.setFontSize(activeFontSize);
                                aLines = doc.splitTextToSize(s.answers, cW - (pad * 2) - 6); 
                                aBoxH = (aLines.length * activeFontSize * 0.5) + (activeFontSize * 0.6); 
                                aBoxY = y + cH - pad - aBoxH; 
                                doc.setFillColor(rgb[0], rgb[1], rgb[2]); 
                                doc.rect(x + pad, aBoxY, cW - (pad * 2), aBoxH, 'F');
                                doc.setTextColor(55, 53, 47); 
                                doc.text(aLines, x + pad + 3, aBoxY + (activeFontSize * 0.55));
                            }

                            let qH = 0, qY = aBoxY, qLines = [];
                            if (s.questions) {
                                doc.setFont(fName, "bold");
                                doc.setFontSize(activeFontSize); 
                                qLines = doc.splitTextToSize(s.questions, cW - (pad * 2) - 6);
                                qH = qLines.length * activeFontSize * 0.45; 
                                qY = s.answers ? (aBoxY - 3 - qH) : (y + cH - pad - qH);
                                doc.setTextColor(55, 53, 47); 
                                doc.text(qLines, x + pad + 3, qY + (activeFontSize * 0.35)); 
                            }

                            if (s.images.length > 0) {
                                let totalAvailH = qY - y - pad - 2;
                                let scaleW = activeImgSize / 100;
                                let limitH = 150 * scaleW;
                                let imgBlockH = Math.min(totalAvailH, limitH);
                                let yOffset = Math.max(0, (totalAvailH - imgBlockH) / 2); 
                                
                                let availW = (cW - (pad * 2)) * scaleW;
                                let xOffset = Math.max(0, (cW - (pad * 2) - availW) / 2);

                                let imgCols = s.images.length === 1 ? 1 : 2;
                                let imgRows = Math.ceil(s.images.length / imgCols);
                                let gap = 3;
                                let iW = (availW - (imgCols - 1)*gap) / imgCols;
                                let iH = (imgBlockH - (imgRows - 1)*gap) / imgRows;

                                s.images.forEach((src, idx) => {
                                    try {
                                        const props = doc.getImageProperties(src);
                                        const ratio = props.height / props.width;
                                        let fW = iW, fH = fW * ratio;
                                        if (fH > iH) { fH = iH; fW = fH / ratio; }
                                        const cx = x + pad + xOffset + (idx % imgCols) * (iW + gap) + (iW - fW) / 2;
                                        const cy = y + pad + yOffset + Math.floor(idx / imgCols) * (iH + gap) + (iH - fH) / 2;
                                        doc.addImage(src, 'JPEG', cx, cy, fW, fH, undefined, 'FAST');
                                    } catch(e) {}
                                });
                            }
                        }
                    }
                }

                doc.save(`Medical_Summary_${Date.now()}.pdf`);
            } catch (error) {
                console.error(error); alert("Export Error. Please try again.");
            } finally {
                btn.disabled = false; btn.innerHTML = original; lucide.createIcons();
            }
        }

        document.getElementById('downloadBtn').onclick = buildPDF;
        document.getElementById('clearBtn').onclick = () => {
            if(confirm("Erase all data and start over?")) { dataStore = []; activeIdx = 0; addNewPage(true); }
        };

        window.addEventListener('resize', scalePages);
        (function init() {
            initStylingControls();
            addNewPage(false);
            refreshAll();
        })();
    </script>
</body>
